<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Files — Knight Ops</title>
<style>
:root{--void:#05061a;--void2:#0a0c24;--card:#10122e;--line:rgba(255,255,255,.09);--gold:#C9922A;--gold2:#e7b84e;--teal:#00D4C8;--txt:#eef0ff;--mut:#9095bd}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1200px 700px at 70% -10%,rgba(0,212,200,.08),transparent),var(--void);color:var(--txt);font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:26px 18px 60px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.dot{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:#0a0a14;font-weight:900}
.brand{font-weight:800;letter-spacing:.4px}
h1{font-size:1.35rem;margin:14px 0 2px}
.sub{color:var(--mut);font-size:.9rem;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.card h2{font-size:.95rem;margin:0 0 12px;color:var(--gold2)}
.f{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.f:first-of-type{border-top:none}
.ficon{width:34px;height:34px;border-radius:8px;background:var(--void2);display:flex;align-items:center;justify-content:center;font-size:16px}
.fmeta{flex:1;min-width:0}
.fname{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsub{font-size:.74rem;color:var(--mut)}
.dl{padding:7px 13px;border:1px solid var(--teal);color:var(--teal);border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;white-space:nowrap}
.drop{border:1.5px dashed var(--line);border-radius:10px;padding:20px;text-align:center;color:var(--mut);font-size:.88rem;cursor:pointer}
.files{margin-top:8px;font-size:.82rem;color:var(--teal)}
.btn{margin-top:14px;width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a14;font-weight:800;font-size:.98rem;cursor:pointer}
.btn:disabled{opacity:.6}
.empty{color:var(--mut);font-size:.86rem;padding:8px 0}
.err{background:rgba(239,68,68,.10);border:1px solid #ef4444;border-radius:12px;padding:20px;text-align:center;color:#fca5a5}
.pill{display:inline-block;font-size:.7rem;padding:3px 9px;border-radius:99px;background:rgba(0,212,200,.12);color:var(--teal);border:1px solid rgba(0,212,200,.3)}
.mine{font-size:.66rem;color:var(--gold2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;margin-left:6px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#0a0a14;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
a{color:var(--gold2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="dot">K</div><div class="brand">KNIGHT OPS</div></div>
  <h1 id="title">Project files</h1>
  <div class="sub" id="sub">Loading…</div>
  <div id="app" style="display:none">
    <div class="card" id="detailsCard" style="display:none"><h2>Project details</h2><div id="details"></div></div>
    <div class="card"><h2>Files &amp; deliverables</h2><div id="fileList"><div class="empty">Loading…</div></div></div>
    <div class="card">
      <h2>Upload a file</h2>
      <p class="sub" style="margin:0 0 10px">Share assets, documents, logos, or anything the team needs.</p>
      <div class="drop" id="drop">Click to choose files to upload</div>
      <input type="file" id="file" multiple style="display:none">
      <div class="files" id="chosen"></div>
      <button class="btn" id="upBtn" onclick="doUpload()" style="display:none">Upload</button>
    </div>
  </div>
  <div id="gate"></div>
</div>
<script>
const SB='https://trpnlkntvulkjerevngm.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRycG5sa250dnVsa2plcmV2bmdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Njg1MDQsImV4cCI6MjA5MDA0NDUwNH0.q9UrZDjbl7c3xC1eTsq46Qg5MmWNogot2ByZ9c_54cM';
const FN=SB+'/functions/v1/';
const TOKEN=new URLSearchParams(location.search).get('t')||'';
async function api(fn,p){const r=await fetch(FN+fn,{method:'POST',headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':'Bearer '+ANON},body:JSON.stringify(p)});return r.json();}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fsize(n){if(!n)return'';var u=['B','KB','MB','GB'];var i=0;n=+n;while(n>=1024&&i<3){n/=1024;i++;}return n.toFixed(n<10&&i>0?1:0)+' '+u[i];}
function icon(t){t=(t||'').toLowerCase();if(/image|png|jpg|jpeg|gif|svg|webp/.test(t))return'🖼️';if(/pdf/.test(t))return'📕';if(/zip|rar/.test(t))return'🗜️';if(/video|mp4|mov/.test(t))return'🎬';if(/sheet|excel|csv/.test(t))return'📊';if(/word|doc/.test(t))return'📝';return'📄';}
function renderFiles(files){var el=document.getElementById('fileList');if(!files||!files.length){el.innerHTML='<div class="empty">No files shared yet.</div>';return;}el.innerHTML=files.map(function(f){return '<div class="f"><div class="ficon">'+icon(f.type||f.name)+'</div><div class="fmeta"><div class="fname">'+esc(f.title||f.name||'File')+(f.mine?'<span class="mine">your upload</span>':'')+'</div><div class="fsub">'+esc(f.name||'')+(f.size?(' · '+fsize(f.size)):'')+'</div></div>'+(f.url?('<a class="dl" href="'+f.url+'" target="_blank" download>Download</a>'):'')+'</div>';}).join('');}
var chosen=[];
function doUpload(){}
(async function(){
  if(!TOKEN){document.getElementById('sub').innerHTML='<div class="err">Missing link token.</div>';return;}
  var r=await api('project-files-view',{action:'load',token:TOKEN});
  if(!r||!r.ok){document.getElementById('title').textContent='Link unavailable';document.getElementById('sub').innerHTML='<div class="err">This link is '+((r&&r.reason)||'invalid')+'. Please ask for a new one.</div>';return;}
  document.getElementById('title').textContent=(r.project_name||'Your project')+' — Files';
  document.getElementById('sub').innerHTML='Files and details for <b>'+esc(r.project_name||'this project')+'</b>. <span class="pill">secure link</span>';
  document.getElementById('app').style.display='block';
  if(r.project_desc){document.getElementById('detailsCard').style.display='block';document.getElementById('details').innerHTML='<p style="margin:0;color:var(--mut);line-height:1.6;font-size:.9rem">'+esc(r.project_desc)+'</p>';}
  renderFiles(r.files);
  var d=document.getElementById('drop'),i=document.getElementById('file');
  d.onclick=function(){i.click();};
  i.onchange=function(){chosen=[];for(var k=0;k<i.files.length;k++)chosen.push(i.files[k]);document.getElementById('chosen').textContent=chosen.map(function(f){return f.name;}).join(', ');document.getElementById('upBtn').style.display=chosen.length?'block':'none';};
  window.doUpload=async function(){
    if(!chosen.length)return;var btn=document.getElementById('upBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>Uploading…';
    for(var k=0;k<chosen.length;k++){var f=chosen[k];var path=TOKEN+'/'+Date.now()+'-'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      try{await fetch(SB+'/storage/v1/object/client-files/'+path,{method:'POST',headers:{'apikey':ANON,'Authorization':'Bearer '+ANON,'Content-Type':f.type||'application/octet-stream'},body:f});
      var url=SB+'/storage/v1/object/public/client-files/'+path;
      await api('project-files-view',{action:'add_file',token:TOKEN,file_name:f.name,file_url:url,storage_path:path,file_size:f.size,file_type:f.type,title:f.name});}catch(e){}}
    btn.disabled=false;btn.textContent='Upload';chosen=[];document.getElementById('chosen').textContent='';document.getElementById('upBtn').style.display='none';document.getElementById('file').value='';
    var rr=await api('project-files-view',{action:'load',token:TOKEN});if(rr&&rr.ok)renderFiles(rr.files);
  };
})();
</script>
</body>
</html>
