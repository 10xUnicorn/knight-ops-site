<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{MAGNET_TITLE}}</title>
<!--
  ============================================================
  EVENT LEAD ENGINE — MAGNET ENGINE (config-driven template)
  ============================================================
  The ele-build edge function injects window.ELE_CONFIG (below) per vendor.
  This single engine renders ALL mechanisms + ALL styles + ALL CTAs,
  captures the lead, dual-posts (Knight Ops capture endpoint + vendor webhook),
  passes interactive data, and routes to the chosen CTA page.
  Required on EVERY build (do not remove): pre-checked consent line,
  "Powered by Knight Ops" footer link, client company copyright.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05061a;--acc:#C9922A;--sec:#7B2FFF;--txt:#f6f5f2;--mut:rgba(255,255,255,.62);--card:rgba(255,255,255,.05);--line:rgba(255,255,255,.14);--radius:16px;--font:'Inter',sans-serif;--display:'Inter',sans-serif}
html,body{min-height:100dvh;background:var(--bg);color:var(--txt);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#fx{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 18px}
.container{width:100%;max-width:560px}
.logo{text-align:center;margin-bottom:18px}
.logo img{max-height:46px}
.logo .wordmark{font-weight:800;letter-spacing:.28em;color:var(--acc);font-size:1.05rem}
.kicker{text-align:center;font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--acc);margin-bottom:12px;opacity:.9}
h1.q{font-family:var(--display);font-size:clamp(1.5rem,5vw,2rem);font-weight:800;text-align:center;line-height:1.2;margin-bottom:10px}
.sub{text-align:center;color:var(--mut);font-size:.95rem;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.grid{grid-template-columns:1fr}}
.opt{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:18px 16px;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:12px}
.opt:hover,.opt.sel{border-color:var(--acc);background:rgba(201,146,42,.12);transform:translateY(-2px)}
.opt .badge{flex:none;width:30px;height:30px;border-radius:50%;background:var(--acc);color:#1a1303;font-weight:800;display:flex;align-items:center;justify-content:center}
.opt b{font-weight:700;font-size:.98rem}
.btn{width:100%;border:none;border-radius:13px;padding:16px;font-weight:800;font-size:1rem;cursor:pointer;background:linear-gradient(135deg,var(--acc),#e7b84e);color:#1a1303;transition:.15s;font-family:inherit}
.btn:hover{filter:brightness(1.07)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-sec{background:var(--card);border:1px solid var(--line);color:var(--txt)}
.field{margin-bottom:12px}
.field input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:13px 15px;font-size:1rem;font-family:inherit}
.field input:focus{outline:none;border-color:var(--acc)}
.consent{display:flex;gap:10px;align-items:flex-start;margin:14px 0 18px;font-size:.76rem;color:var(--mut);line-height:1.45}
.consent input{margin-top:3px;width:17px;height:17px;accent-color:var(--acc);flex:none}
.consent a{color:var(--acc)}
.card-panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px}
.foot{text-align:center;margin-top:22px;font-size:.72rem;color:var(--mut)}
.foot a{color:var(--acc);text-decoration:none;font-weight:700}
.step{display:none;animation:fade .45s ease both}
.step.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.reveal-tag{display:inline-block;background:rgba(201,146,42,.16);border-left:3px solid var(--acc);padding:12px 16px;border-radius:8px;margin:14px 0;text-align:left;width:100%}
.reveal-tag small{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:4px}
.gift-card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;margin:16px 0}
.gift-card .v{font-size:.72rem;color:var(--acc);font-weight:700}
.wheel-wrap{text-align:center;margin:10px 0 18px}
#wheel{max-width:260px;width:100%}
.scratch{position:relative;width:100%;height:130px;border-radius:12px;overflow:hidden;margin:14px 0;cursor:pointer}
.scratch canvas{position:absolute;inset:0;width:100%;height:100%}
.scratch .under{display:flex;align-items:center;justify-content:center;height:100%;font-weight:800;font-size:1.1rem;background:rgba(201,146,42,.14)}
.chip{border:1px solid var(--acc);border-radius:999px;padding:7px 13px;font-size:.82rem;cursor:pointer;transition:.15s}
.chip.sel{background:var(--acc);color:#1a1303;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="wrap"><div class="container">
  <div id="app"></div>
  <div class="foot">Powered by <a href="https://knightops.biz" target="_blank" rel="noopener" id="poweredLink">Knight Ops</a> · <span id="copyright">© Company</span></div>
</div></div>

<script>
/* ===== DEFAULT DEMO CONFIG — the ele-build edge function overwrites this ===== */
window.ELE_CONFIG = window.ELE_CONFIG || {
  build_id:"demo",
  magnet_title:"What Makes a Great Speech?",
  company:"Knight Ops",
  logo_url:"",
  design_style:"cosmic_gold",
  colors:{primary:"#05061a",accent:"#C9922A",secondary:"#7B2FFF",text:"#f6f5f2"},
  mechanism:"quiz",
  config:{
    question:"What's the #1 way to tell if your speech was a good speech?",
    sub:"Pick the strongest answer to reveal what actually matters.",
    choices:["People come up to you after","No mistakes, engaged audience","People converted into your offer","Killer content to reuse"],
    correct:2,
    result:"The best answer is conversions.",
    explain:"Applause feels good, but conversions are the real measure. A great speech moves people to act."
  },
  gift:{name:"The Speaker's Edge Guide",value:"$197 value",file_url:"",url:""},
  cta:{type:"download"}, // download | calendar | text_keyword | offer | redirect
  cta_config:{}, // calendar:{url|embed}, text_keyword:{keyword,phone}, offer:{offer_url,checkout}, redirect:{url}
  consent_text:"Yes! Send my gift and keep me in the loop. I agree {company} and Knight Ops may follow up by email.",
  endpoints:{
    capture:"https://trpnlkntvulkjerevngm.supabase.co/functions/v1/ele-capture",
    anon:"PUBLIC_ANON_KEY",
    vendor_webhook:"" // optional: vendor CRM webhook URL
  }
};

const C=window.ELE_CONFIG, cfg=C.config||{}, app=document.getElementById('app');
const STATE={interactive:{}, type:''};

/* ---- apply palette + style ---- */
(function(){
  const styles={
    cosmic_gold:{bg:C.colors.primary||'#05061a',display:"'Playfair Display',serif",fx:'stars'},
    clean_light:{bg:'#ffffff',text:'#1a1303',mut:'#5a5a5a',card:'#f6f2ea',line:'#e4ddd0',display:"'Playfair Display',serif",fx:'none'},
    bold_neon:{bg:'#0a0a0a',display:"'Inter',sans-serif",fx:'grid'},
    elegant_editorial:{bg:C.colors.primary||'#11132e',display:"'Playfair Display',serif",fx:'none'}
  };
  const s=styles[C.design_style]||styles.cosmic_gold;const r=document.documentElement.style;
  r.setProperty('--bg',s.bg);r.setProperty('--acc',C.colors.accent||'#C9922A');r.setProperty('--sec',C.colors.secondary||'#7B2FFF');
  r.setProperty('--display',s.display);
  if(s.text){r.setProperty('--txt',s.text);r.setProperty('--mut',s.mut);r.setProperty('--card',s.card);r.setProperty('--line',s.line);}
  STATE.fx=s.fx;
  document.title=C.magnet_title||'Lead Magnet';
  document.getElementById('copyright').textContent='© '+(C.company||'Company');
})();

function logoHtml(){return C.logo_url?'<div class="logo"><img src="'+C.logo_url+'" alt="'+C.company+'"></div>':'<div class="logo"><div class="wordmark">'+(C.company||'BRAND').toUpperCase()+'</div></div>';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ===================== MECHANISM RENDERERS ===================== */
function renderMechanism(){
  const m=C.mechanism;
  if(m==='quiz')return renderQuiz();
  if(m==='guess_win')return renderGuess();
  if(m==='spin_win')return renderSpin();
  if(m==='contest')return renderContest();
  if(m==='archetype')return renderArchetype();
  if(m==='scratch'||m==='pick_door')return renderScratch();
  return renderContest();
}
function renderQuiz(){
  let sel=-1;
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Quick Question</div><h1 class="q">'+esc(cfg.question)+'</h1><div class="sub">'+esc(cfg.sub||'')+'</div><div class="grid" id="opts"></div><button class="btn" id="go" style="margin-top:18px" disabled>See the answer</button></div>';
  const L=['A','B','C','D'];(cfg.choices||[]).forEach((ch,i)=>{const d=document.createElement('div');d.className='opt';d.innerHTML='<span class="badge">'+L[i]+'</span><b>'+esc(ch)+'</b>';d.onclick=()=>{document.querySelectorAll('#opts .opt').forEach(o=>o.classList.remove('sel'));d.classList.add('sel');sel=i;document.getElementById('go').disabled=false;};document.getElementById('opts').appendChild(d);});
  document.getElementById('go').onclick=()=>{STATE.type='answer';STATE.interactive={selected:L[sel],selected_text:cfg.choices[sel],correct:L[cfg.correct],is_correct:sel===cfg.correct};showQuizReveal();};
}
function showQuizReveal(){
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Your Result</div><h1 class="q">'+esc(cfg.result||'Here’s the answer')+'</h1><div class="reveal-tag"><small>Correct Answer</small><b>'+esc(cfg.choices[cfg.correct])+'</b></div><div class="sub" style="margin-bottom:20px">'+esc(cfg.explain||'')+'</div></div>';
  setTimeout(showCapture,1200);
}
function renderGuess(){
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Guess &amp; Win</div><h1 class="q">'+esc(cfg.label||'Guess the number')+'</h1><div class="gift-card"><b>🏆 '+esc(cfg.prize_win||'Closest guess wins')+'</b><div class="v">🎁 Everyone gets: '+esc(cfg.prize_all||C.gift.name)+'</div></div><div class="field"><input type="number" id="guess" placeholder="Type your best guess..."></div><button class="btn" id="go" disabled>Lock in my guess</button></div>';
  const inp=document.getElementById('guess');inp.oninput=()=>document.getElementById('go').disabled=!inp.value;
  document.getElementById('go').onclick=()=>{STATE.type='guess';STATE.interactive={guess:inp.value,target:cfg.number};showCapture();};
}
function renderContest(){
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Enter to Win</div><h1 class="q">'+esc((cfg.prize?('Win '+cfg.prize):'Enter to Win'))+'</h1><div class="sub">'+esc(cfg.rules||'Enter below for your chance to win.')+'</div></div>';
  setTimeout(showCapture,300);
}
function renderArchetype(){
  const tr=cfg.traits||[];const picked=[];
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Find Your Type</div><h1 class="q">'+esc(cfg.prompt||'What’s your type?')+'</h1><div class="chips" id="chips"></div><button class="btn" id="go" disabled>Reveal my result</button></div>';
  tr.forEach(t=>{const c=document.createElement('div');c.className='chip';c.textContent=t;c.onclick=()=>{c.classList.toggle('sel');const i=picked.indexOf(t);if(i>=0)picked.splice(i,1);else picked.push(t);document.getElementById('go').disabled=!picked.length;};document.getElementById('chips').appendChild(c);});
  document.getElementById('go').onclick=()=>{STATE.type='archetype';STATE.interactive={traits:picked,result:cfg.result};showCapture();};
}
function renderScratch(){
  const opts=cfg.options||[cfg.reveal||'You win a free gift!'];const prize=opts[Math.floor(Math.random()*opts.length)];STATE.interactive={revealed:prize};STATE.type='scratch_result';
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Scratch to Reveal</div><h1 class="q">'+esc(cfg.reveal||'Scratch to reveal your prize')+'</h1><div class="scratch" id="sc"><div class="under">🎉 '+esc(prize)+'</div><canvas id="scc"></canvas></div><button class="btn" id="go" disabled>Claim it</button></div>';
  initScratch(()=>document.getElementById('go').disabled=false);
  document.getElementById('go').onclick=showCapture;
}
function initScratch(done){
  const wrap=document.getElementById('sc'),cv=document.getElementById('scc');const ctx=cv.getContext('2d');
  function size(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;ctx.fillStyle='#b9911f';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#1a1303';ctx.font='bold 14px Inter';ctx.textAlign='center';ctx.fillText('SCRATCH HERE',cv.width/2,cv.height/2);}
  size();let drawing=false,cleared=0;
  function scratch(x,y){ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(x,y,22,0,7);ctx.fill();cleared++;if(cleared>40){cv.style.opacity=0;done();}}
  function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top];}
  cv.addEventListener('pointerdown',e=>{drawing=true;scratch(...pos(e));});
  cv.addEventListener('pointermove',e=>{if(drawing)scratch(...pos(e));});
  addEventListener('pointerup',()=>drawing=false);
}
function renderSpin(){
  const prizes=cfg.prizes||['Free gift','10% off','Free consult','Swag'];
  app.innerHTML=logoHtml()+'<div class="step active"><div class="kicker">Spin to Win</div><h1 class="q">Everyone wins something.</h1><div class="wheel-wrap"><canvas id="wheel" width="280" height="280"></canvas></div><button class="btn" id="go">Spin the wheel</button></div>';
  const cv=document.getElementById('wheel'),ctx=cv.getContext('2d'),N=prizes.length,cx=140,cy=140,rad=130;let ang=0,spinning=false;
  const cols=[C.colors.accent||'#C9922A',C.colors.secondary||'#7B2FFF','#00D4C8','#e7b84e','#3b82f6','#f87171'];
  function draw(){ctx.clearRect(0,0,280,280);for(let i=0;i<N;i++){const a0=ang+i*2*Math.PI/N,a1=ang+(i+1)*2*Math.PI/N;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rad,a0,a1);ctx.fillStyle=cols[i%cols.length];ctx.fill();ctx.save();ctx.translate(cx,cy);ctx.rotate((a0+a1)/2);ctx.fillStyle='#1a1303';ctx.font='bold 11px Inter';ctx.textAlign='right';ctx.fillText(prizes[i].slice(0,14),rad-10,4);ctx.restore();}ctx.fillStyle=C.colors.text||'#fff';ctx.beginPath();ctx.moveTo(cx+rad-2,cy-9);ctx.lineTo(cx+rad+14,cy);ctx.lineTo(cx+rad-2,cy+9);ctx.fill();}
  draw();
  document.getElementById('go').onclick=()=>{if(spinning)return;spinning=true;const win=Math.floor(Math.random()*N);const target=2*Math.PI*5+(2*Math.PI - (win*2*Math.PI/N) - Math.PI/N);const start=ang,t0=performance.now(),dur=3600;
    (function anim(t){const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3);ang=start+target*e;draw();if(p<1)requestAnimationFrame(anim);else{STATE.type='spin_result';STATE.interactive={won:prizes[win]};setTimeout(showCapture,700);}})(t0);};
}

/* ===================== CAPTURE FORM ===================== */
function showCapture(){
  const consent=(C.consent_text||'I agree {company} and Knight Ops may follow up by email.').replace('{company}',C.company||'this brand');
  app.innerHTML=logoHtml()+'<div class="step active"><div class="card-panel"><div class="kicker">One last step</div><h1 class="q" style="font-size:1.4rem">Where should we send your '+esc(C.gift?C.gift.name:'gift')+'?</h1>'+(C.gift&&C.gift.value?'<div class="gift-card"><b>🎁 '+esc(C.gift.name)+'</b><div class="v">'+esc(C.gift.value)+'</div></div>':'')+'<div class="field"><input type="text" id="cn" placeholder="Your name"></div><div class="field"><input type="email" id="ce" placeholder="Your email"></div><div class="field"><input type="tel" id="cp" placeholder="Your phone"></div><label class="consent"><input type="checkbox" id="optin" checked><span>'+esc(consent)+'</span></label><button class="btn" id="submit">Get my gift →</button></div></div>';
  document.getElementById('submit').onclick=submitLead;
}
async function submitLead(){
  const name=document.getElementById('cn').value.trim(),email=document.getElementById('ce').value.trim(),phone=document.getElementById('cp').value.trim(),optin=document.getElementById('optin').checked;
  if(!email){alert('Please add your email.');return;}
  const btn=document.getElementById('submit');btn.disabled=true;btn.textContent='Sending...';
  const payload={build_id:C.build_id,name,email,phone,interactive_type:STATE.type,interactive_data:STATE.interactive,consent_vendor_email:optin,consent_vendor_sms:optin,consent_ko_email:optin,event_name:C.event_name||'',vendor_company:C.company||'',source_tag:'ele-magnet',user_agent:navigator.userAgent};
  // 1) Knight Ops capture (stores + forwards + KO list)
  try{await fetch(C.endpoints.capture,{method:'POST',headers:{'Content-Type':'application/json','apikey':C.endpoints.anon,'Authorization':'Bearer '+C.endpoints.anon},body:JSON.stringify(payload)});}catch(e){console.error('capture',e);}
  // 2) Vendor webhook (direct, real-time) if provided and not routed server-side
  if(C.endpoints.vendor_webhook){try{await fetch(C.endpoints.vendor_webhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){console.error('webhook',e);}}
  showCTA();
}

/* ===================== CTA PAGE ===================== */
function showCTA(){
  const t=C.cta&&C.cta.type||'download',cc=C.cta_config||{};
  let inner='';
  if(t==='download'){const url=(C.gift&&(C.gift.file_url||C.gift.url))||'#';inner='<div class="kicker">It’s yours</div><h1 class="q">Your '+esc(C.gift.name)+' is ready.</h1><div class="sub">Open it now, and watch your inbox for your copy.</div><a class="btn" href="'+esc(url)+'" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none">⬇️ Download '+esc(C.gift.name)+'</a>';}
  else if(t==='calendar'){if(cc.embed){inner='<div class="kicker">Last step</div><h1 class="q">Book your time</h1><div style="margin-top:14px">'+cc.embed+'</div>';}else{inner='<div class="kicker">Last step</div><h1 class="q">Pick a time that works.</h1><div class="sub">Grab a spot now while it’s top of mind.</div><a class="btn" href="'+esc(cc.url||'#')+'" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none">📅 Book my call</a>';}}
  else if(t==='text_keyword'){const body=encodeURIComponent(cc.keyword||'');inner='<div class="kicker">Let’s connect</div><h1 class="q">Text '+esc(cc.keyword||'the keyword')+' to get started.</h1><div class="sub">Tap below and it opens your messages, pre-filled.</div><a class="btn" href="sms:'+esc(cc.phone||'')+'?&body='+body+'" style="display:block;text-align:center;text-decoration:none">📲 Text '+esc(cc.keyword||'now')+'</a>';}
  else if(t==='offer'){inner='<div class="kicker">Because you’re here</div><h1 class="q">You’re ready for the next step.</h1><div class="sub">You came, you played, you showed up. Here’s where it gets real. Take the next step now while the momentum is yours.</div><a class="btn" href="'+esc(cc.offer_url||cc.checkout||'#')+'" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none">🚀 See the offer</a>'+(cc.checkout?'<a class="btn btn-sec" href="'+esc(cc.checkout)+'" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none;margin-top:10px">Get started now</a>':'');}
  else{inner='<div class="kicker">All set</div><h1 class="q">You’re in. 🎉</h1><div class="sub">Check your email for your gift.</div>'+(cc.url?'<a class="btn" href="'+esc(cc.url)+'" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none">Continue →</a>':'');}
  app.innerHTML=logoHtml()+'<div class="step active"><div class="card-panel">'+inner+'</div></div>';
  confetti();
}

/* ===================== FX ===================== */
function bgFx(){const cv=document.getElementById('fx');if(STATE.fx==='none'){return;}const x=cv.getContext('2d');let w,h,p=[];const cols=['rgba(201,146,42,','rgba(0,212,200,','rgba(123,47,255,','rgba(255,255,255,'];function rs(){w=cv.width=innerWidth;h=cv.height=innerHeight;p=[];const n=Math.min(90,(w*h)/16000);for(let i=0;i<n;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,a:Math.random()*.5+.15,s:Math.random()*.3+.05,c:cols[Math.floor(Math.random()*cols.length)]});}function dr(){x.clearRect(0,0,w,h);if(STATE.fx==='grid'){x.strokeStyle='rgba(0,212,200,.06)';for(let i=0;i<w;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke();}for(let j=0;j<h;j+=40){x.beginPath();x.moveTo(0,j);x.lineTo(w,j);x.stroke();}}p.forEach(s=>{s.y-=s.s;if(s.y<0)s.y=h;x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fillStyle=s.c+s.a+')';x.fill();});requestAnimationFrame(dr);}rs();dr();addEventListener('resize',rs);}
function confetti(){const cv=document.getElementById('fx');const x=cv.getContext('2d');const cols=[C.colors.accent,C.colors.secondary,'#00D4C8','#fff','#34d399'];let ps=[];for(let i=0;i<90;i++)ps.push({x:Math.random()*innerWidth,y:-20,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,r:Math.random()*6+3,c:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6});let t=0;(function a(){x.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.07;x.save();x.translate(p.x,p.y);x.rotate(p.rot+=.1);x.fillStyle=p.c;x.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);x.restore();});t++;if(t<150)requestAnimationFrame(a);})();}

/* ===== boot ===== */
bgFx();
renderMechanism();
</script>
