<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Call — Knight Ops</title>
<meta name="description" content="Schedule a call with Daniel Knight at Knight Ops. Choose from available meeting types and pick a time that works for you.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.knightops.biz/booking">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.knightops.biz/booking">
<meta property="og:title" content="Book a Call — Knight Ops">
<meta property="og:description" content="Schedule a call with Daniel Knight. Pick a meeting type and time that works for you.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --deep:#06061A;
  --surface:rgba(12,12,22,0.75);
  --border-gold:rgba(200,164,86,0.2);
  --glass-bg:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.06);
  --white:#F4F4F5;
  --gray:#A1A1AA;
  --muted:#71717A;
  --gold:#C8A456;
  --gold-bright:#FFD166;
  --gold-glow:rgba(200,164,86,0.4);
  --violet:#7B61FF;
  --cyan:#00E5FF;
  --error:#ef4444;
  --success:#22c55e;
}

html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--deep);
  color:var(--white);
  line-height:1.65;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* Background layers */
.bg-grid{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:
    linear-gradient(rgba(200,164,86,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,164,86,0.025) 1px,transparent 1px);
  background-size:80px 80px;
  z-index:0;pointer-events:none;
}
.bg-ambient{
  position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 900px 600px at 15% 20%,rgba(200,164,86,0.06),transparent 70%),
    radial-gradient(ellipse 700px 500px at 85% 70%,rgba(0,229,255,0.04),transparent 70%),
    radial-gradient(ellipse 600px 400px at 50% 50%,rgba(123,97,255,0.03),transparent 70%);
}

/* Layout */
.page-wrap{
  position:relative;z-index:1;
  max-width:800px;margin:0 auto;
  padding:40px 20px 80px;
  min-height:100vh;
}

/* Header */
.book-header{text-align:center;margin-bottom:40px}
.book-logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:5px;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:6px;
}
.book-logo a{color:var(--gold);text-decoration:none}
.book-owner{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.6rem,4vw,2.2rem);
  font-weight:600;color:var(--white);
  margin-bottom:8px;
}
.book-welcome{
  font-size:0.95rem;color:var(--gray);
  max-width:500px;margin:0 auto;line-height:1.7;
}

/* Glass card */
.glass-card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:16px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  overflow:hidden;
}

/* Hub: booking type cards */
.hub-grid{display:flex;flex-direction:column;gap:16px}

.type-card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:16px;
  padding:28px 28px 24px;
  display:flex;justify-content:space-between;align-items:center;
  gap:20px;
  transition:border-color 0.25s,background 0.25s;
  cursor:pointer;
}
.type-card:hover{
  border-color:var(--border-gold);
  background:rgba(255,255,255,0.05);
}
.type-card-left{flex:1;min-width:0}
.type-card-color{
  width:4px;height:48px;border-radius:2px;
  flex-shrink:0;margin-right:16px;
}
.type-card-body{display:flex;align-items:flex-start;gap:0}
.type-card h3{
  font-family:'Cormorant Garamond',serif;
  font-size:1.35rem;font-weight:600;color:var(--white);
  margin-bottom:4px;
}
.type-card-desc{
  font-size:0.88rem;color:var(--gray);line-height:1.6;
  margin-bottom:10px;
}
.type-card-meta{
  display:flex;gap:16px;align-items:center;flex-wrap:wrap;
}
.type-card-meta span{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.78rem;font-weight:500;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.type-card-meta svg{width:14px;height:14px;opacity:0.6}
.type-card-price{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.82rem;font-weight:600;
  color:var(--gold);
}

.btn-gold{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-bright));
  color:var(--deep);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.85rem;font-weight:700;
  padding:12px 28px;border:none;border-radius:10px;
  cursor:pointer;text-decoration:none;
  box-shadow:0 4px 20px var(--gold-glow);
  transition:transform 0.15s,box-shadow 0.15s;
  white-space:nowrap;flex-shrink:0;
}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--gold-glow)}
.btn-gold:active{transform:translateY(0)}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.btn-outline{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;
  color:var(--gold);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.82rem;font-weight:600;
  padding:10px 20px;border:1px solid var(--border-gold);border-radius:10px;
  cursor:pointer;text-decoration:none;
  transition:background 0.2s,border-color 0.2s;
}
.btn-outline:hover{background:rgba(200,164,86,0.08);border-color:var(--gold)}

/* Back button */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--gray);
  font-family:'Inter',sans-serif;font-size:0.85rem;
  cursor:pointer;padding:8px 0;margin-bottom:20px;
  transition:color 0.2s;
}
.back-btn:hover{color:var(--white)}
.back-btn svg{width:16px;height:16px}

/* Steps indicator */
.steps-indicator{
  display:flex;justify-content:center;gap:8px;
  margin-bottom:28px;
}
.step-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  transition:background 0.3s,transform 0.3s;
}
.step-dot.active{background:var(--gold);transform:scale(1.3)}
.step-dot.done{background:rgba(200,164,86,0.4)}

/* Calendar */
.cal-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;padding:0 4px;
}
.cal-month{
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem;font-weight:600;color:var(--white);
}
.cal-nav{display:flex;gap:8px}
.cal-nav button{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);
  color:var(--gray);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,border-color 0.2s;
}
.cal-nav button:hover{background:rgba(255,255,255,0.08);border-color:var(--border-gold)}
.cal-nav button:disabled{opacity:0.3;cursor:not-allowed}
.cal-nav svg{width:16px;height:16px}

.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;text-align:center;
}
.cal-day-label{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.7rem;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);padding:8px 0;
}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:10px;font-size:0.88rem;font-weight:500;
  color:var(--gray);cursor:pointer;
  transition:background 0.15s,color 0.15s,border-color 0.15s;
  border:1px solid transparent;
  position:relative;
}
.cal-day:hover:not(.disabled):not(.empty){
  background:rgba(200,164,86,0.08);color:var(--white);
}
.cal-day.today{border-color:var(--gold);color:var(--gold)}
.cal-day.selected{
  background:linear-gradient(135deg,var(--gold),var(--gold-bright));
  color:var(--deep);font-weight:700;border-color:transparent;
}
.cal-day.disabled{color:rgba(255,255,255,0.15);cursor:not-allowed}
.cal-day.empty{cursor:default}

/* Timezone selector */
.tz-row{
  display:flex;align-items:center;gap:8px;
  margin-top:20px;padding:12px 16px;
  background:rgba(255,255,255,0.02);
  border-radius:10px;border:1px solid var(--glass-border);
}
.tz-row svg{width:16px;height:16px;color:var(--muted);flex-shrink:0}
.tz-row label{font-size:0.78rem;color:var(--muted);white-space:nowrap}
.tz-select{
  flex:1;background:transparent;border:none;
  color:var(--white);font-family:'Inter',sans-serif;
  font-size:0.82rem;cursor:pointer;
  outline:none;
}
.tz-select option{background:var(--deep);color:var(--white)}

/* Time slots */
.slots-date{
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;font-weight:600;color:var(--white);
  margin-bottom:16px;text-align:center;
}
.slots-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:8px;
}
.slot-btn{
  padding:12px 8px;border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--glass-border);
  color:var(--white);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.85rem;font-weight:500;
  cursor:pointer;text-align:center;
  transition:background 0.15s,border-color 0.15s,color 0.15s;
}
.slot-btn:hover{background:rgba(200,164,86,0.1);border-color:var(--border-gold)}
.slot-btn.selected{
  background:linear-gradient(135deg,var(--gold),var(--gold-bright));
  color:var(--deep);font-weight:700;border-color:transparent;
}
.no-slots{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:0.9rem;
}
.no-slots svg{width:40px;height:40px;color:var(--muted);margin-bottom:12px;opacity:0.4}

/* Form */
.form-group{margin-bottom:20px}
.form-label{
  display:block;
  font-family:'Space Grotesk',sans-serif;
  font-size:0.78rem;font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;
  color:var(--gray);margin-bottom:6px;
}
.form-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--glass-border);
  border-radius:10px;
  color:var(--white);
  font-family:'Inter',sans-serif;
  font-size:0.92rem;
  transition:border-color 0.2s;
  outline:none;
}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{min-height:100px;resize:vertical}
select.form-input{cursor:pointer}
select.form-input option{background:var(--deep);color:var(--white)}
.form-hint{font-size:0.75rem;color:var(--muted);margin-top:4px}
.form-error{font-size:0.75rem;color:var(--error);margin-top:4px;display:none}

/* Confirm summary */
.summary-card{
  background:rgba(200,164,86,0.04);
  border:1px solid var(--border-gold);
  border-radius:14px;padding:24px;margin-bottom:24px;
}
.summary-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.summary-row:last-child{border-bottom:none}
.summary-label{
  font-size:0.78rem;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;
  text-transform:uppercase;letter-spacing:0.5px;
}
.summary-value{
  font-size:0.92rem;color:var(--white);
  font-weight:500;text-align:right;
}
.cancel-policy{
  font-size:0.78rem;color:var(--muted);
  line-height:1.6;margin-top:16px;padding:14px;
  background:rgba(255,255,255,0.02);
  border-radius:10px;border:1px solid var(--glass-border);
}

/* Success */
.success-wrap{text-align:center;padding:20px 0}
.success-check{
  width:72px;height:72px;margin:0 auto 24px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05));
  border:2px solid var(--success);
  display:flex;align-items:center;justify-content:center;
  animation:checkPop 0.5s ease;
}
@keyframes checkPop{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.15)}
  100%{transform:scale(1);opacity:1}
}
.success-check svg{width:36px;height:36px;color:var(--success)}
.success-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;font-weight:600;color:var(--white);
  margin-bottom:8px;
}
.success-sub{font-size:0.9rem;color:var(--gray);margin-bottom:28px}
.cal-links{
  display:flex;gap:10px;justify-content:center;
  flex-wrap:wrap;margin-bottom:24px;
}
.manage-links{
  display:flex;gap:12px;justify-content:center;
  flex-wrap:wrap;margin-top:20px;
  padding-top:20px;border-top:1px solid var(--glass-border);
}
.manage-links a{
  font-size:0.82rem;color:var(--muted);
  text-decoration:none;transition:color 0.2s;
}
.manage-links a:hover{color:var(--gold)}

/* Cancel/Reschedule views */
.action-card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:32px;text-align:center;
}
.action-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem;font-weight:600;color:var(--white);
  margin-bottom:8px;
}
.action-sub{font-size:0.9rem;color:var(--gray);margin-bottom:24px}
.action-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-danger{
  background:rgba(239,68,68,0.15);
  border:1px solid rgba(239,68,68,0.3);
  color:var(--error);padding:12px 28px;
  border-radius:10px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  font-size:0.85rem;font-weight:600;
  transition:background 0.2s;
}
.btn-danger:hover{background:rgba(239,68,68,0.25)}

/* Skeletons */
.skel{
  background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.03) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:10px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:120px;margin-bottom:16px;border-radius:16px}
.skel-text{height:16px;margin-bottom:12px;width:60%;border-radius:4px}
.skel-text.w80{width:80%}
.skel-text.w40{width:40%}

/* Transition container */
.step-container{
  transition:opacity 0.3s,transform 0.3s;
  opacity:1;transform:translateY(0);
}
.step-container.leaving{opacity:0;transform:translateY(-12px)}
.step-container.entering{opacity:0;transform:translateY(12px)}

/* Spinner */
.spinner{
  width:20px;height:20px;border:2px solid transparent;
  border-top-color:currentColor;border-radius:50%;
  animation:spin 0.6s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(239,68,68,0.15);
  border:1px solid rgba(239,68,68,0.3);
  color:var(--error);
  padding:12px 24px;border-radius:10px;
  font-size:0.85rem;font-weight:500;
  z-index:1000;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;pointer-events:auto}

/* Mobile */
@media(max-width:600px){
  .page-wrap{padding:24px 16px 60px}
  .type-card{padding:20px;flex-direction:column;align-items:flex-start;gap:16px}
  .type-card .btn-gold{width:100%;justify-content:center}
  .cal-grid{gap:2px}
  .cal-day{font-size:0.8rem}
  .slots-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .summary-row{flex-direction:column;gap:4px}
  .summary-value{text-align:left}
  .cal-links{flex-direction:column;align-items:center}
}
</style>
</head>

  };

  function locationIcon(type) {
    if (type === 'video' || type === 'zoom' || type === 'google_meet') return icons.video;
    if (type === 'phone') return icons.phone;
    if (type === 'in_person') return icons.mapPin;
    return icons.video;
  }
  function locationLabel(type) {
    if (type === 'zoom') return 'Zoom';
    if (type === 'google_meet') return 'Google Meet';
    if (type === 'video') return 'Video Call';
    if (type === 'phone') return 'Phone Call';
    if (type === 'in_person') return 'In Person';
    return type || 'Video Call';
  }

  // ─── Toast ───
  let toastTimer;
  function showToast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
  }

  // ─── URL Parsing ───
  function parseURL() {
    const params = new URLSearchParams(location.search);
    const pathParts = location.pathname.split('/').filter(Boolean);

    // Reschedule
    if (params.get('action') === 'reschedule' && params.get('id') && params.get('token')) {
      return { mode: 'reschedule', id: params.get('id'), token: params.get('token') };
    }
    // Cancel
    if (params.get('action') === 'cancel' && params.get('id') && params.get('token')) {
      return { mode: 'cancel', id: params.get('id'), token: params.get('token') };
    }
    // Booking type from query
    if (params.get('type')) {
      return { mode: 'flow', slug: params.get('type') };
    }
    // Booking type from path: /book/blueprint
    if (pathParts.length === 2 && (pathParts[0] === 'booking' || pathParts[0] === 'book')) {
      return { mode: 'flow', slug: pathParts[1] };
    }
    // Pre-fill
    const prefill = {};
    if (params.get('name')) prefill.name = params.get('name');
    if (params.get('email')) prefill.email = params.get('email');

    return { mode: 'hub', prefill };
  }

  // ─── Init ───
  async function init() {
    const route = parseURL();

    // Load settings
    const { data: settingsData } = await sb.from('booking_settings').select('key,value');
    if (settingsData) {
      settingsData.forEach(s => { state.settings[s.key] = s.value; });
    }

    const welcomeEl = $('#welcomeMsg');
    welcomeEl.textContent = state.settings.welcome_message || 'Select a meeting type to get started.';

    if (route.mode === 'reschedule') {
      await initReschedule(route.id, route.token);
    } else if (route.mode === 'cancel') {
      await initCancel(route.id, route.token);
    } else if (route.mode === 'flow') {
      await initFlow(route.slug);
    } else {
      if (route.prefill) {
        if (route.prefill.name) state.formData.name = route.prefill.name;
        if (route.prefill.email) state.formData.email = route.prefill.email;
      }
      await initHub();
    }
  }

  // ─── Hub ───
  async function initHub() {
    state.mode = 'hub';
    app.innerHTML = '<div class="hub-grid"><div class="skel skel-card"></div><div class="skel skel-card"></div><div class="skel skel-card"></div></div>';

    const { data, error } = await sb
      .from('booking_types')
      .select('*')
      .eq('is_active', true)
      .eq('is_private', false)
      .order('sort_order', { ascending: true });

    if (error) { showToast('Failed to load booking types'); return; }
    state.types = data || [];
    renderHub();
  }

  function renderHub() {
    if (!state.types.length) {
      app.innerHTML = '<div class="no-slots"><p>No booking types available at this time.</p></div>';
      return;
    }
    app.innerHTML = '<div class="hub-grid">' + state.types.map(t => {
      const dur = t.duration_minutes || 30;
      const price = t.price_cents ? '$' + (t.price_cents / 100).toFixed(t.price_cents % 100 === 0 ? 0 : 2) : 'Free';
      const color = t.color || '#C8A456';
      return `
        <div class="type-card" data-slug="${t.slug}" role="button" tabindex="0" aria-label="Book ${esc(t.name)}">
          <div class="type-card-left" style="display:flex;align-items:flex-start;gap:16px">
            <div class="type-card-color" style="background:${color}"></div>
            <div>
              <h3>${esc(t.name)}</h3>
              ${t.description ? '<p class="type-card-desc">' + esc(t.description) + '</p>' : ''}
              <div class="type-card-meta">
                <span>${icons.clock} ${dur} min</span>
                <span>${locationIcon(t.location_type)} ${locationLabel(t.location_type)}</span>
                <span class="type-card-price">${price}</span>
              </div>
            </div>
          </div>
          <button class="btn-gold" onclick="event.stopPropagation()">Book Now</button>
        </div>`;
    }).join('') + '</div>';

    $$('.type-card', app).forEach(card => {
      const slug = card.dataset.slug;
      const handler = () => {
        history.pushState({}, '', '/booking?type=' + slug);
        initFlow(slug);
      };
      card.addEventListener('click', handler);
      card.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
      const btn = $('button', card);

  // ─── Flow ───
  async function initFlow(slug) {
    state.mode = 'flow';
    state.step = 1;
    app.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="color:var(--gold)"></div></div>';

    // Load type
    const { data: typeData } = await sb
      .from('booking_types')
      .select('*')
      .eq('slug', slug)
      .eq('is_active', true)
      .single();

    if (!typeData) {
      showToast('Booking type not found');
      history.pushState({}, '', '/book');
      initHub();
      return;
    }

    state.selectedType = typeData;
    document.title = typeData.name + ' — Book | Knight Ops';

    // Load availability + overrides
    const [avail, overrides] = await Promise.all([
      sb.from('booking_availability').select('*').eq('is_active', true),
      sb.from('booking_overrides').select('*'),
    ]);
    state.availability = avail.data || [];
    state.overrides = overrides.data || [];

    // Init calendar to current month
    const now = new Date();
    state.calMonth = now.getMonth();
    state.calYear = now.getFullYear();
    state.selectedDate = null;
    state.selectedSlot = null;

    renderStep();
  }

  function renderStep() {
    const container = app;
    container.classList.add('leaving');
    setTimeout(() => {
      container.classList.remove('leaving');
      container.classList.add('entering');

      if (state.step === 1) renderDateStep();
      else if (state.step === 2) renderTimeStep();
      else if (state.step === 3) renderDetailsStep();
      else if (state.step === 4) renderConfirmStep();
      else if (state.step === 5) renderSuccessStep();

      requestAnimationFrame(() => {
        container.classList.remove('entering');
      });
    }, 200);
  }

  // ─── Step 1: Date ───
  function renderDateStep() {
    const t = state.selectedType;

    const price = t.price_cents ? '$' + (t.price_cents / 100).toFixed(t.price_cents % 100 === 0 ? 0 : 2) : 'Free';

  function populateTimezones() {
    const sel = $('#tzSelect');
    if (!sel) return;
    const zones = [
      'America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
      'America/Phoenix','America/Anchorage','Pacific/Honolulu',
      'Europe/London','Europe/Paris','Europe/Berlin',
      'Asia/Tokyo','Asia/Shanghai','Asia/Kolkata','Asia/Dubai',
      'Australia/Sydney','Pacific/Auckland',
      'UTC'
    ];
    // Ensure user's detected tz is in list
    if (!zones.includes(state.timezone)) zones.unshift(state.timezone);
    sel.innerHTML = zones.map(z => {
      const label = z.replace(/_/g, ' ');
      return `<option value="${z}" ${z === state.timezone ? 'selected' : ''}>${label}</option>`;
    }).join('');
    sel.addEventListener('change', () => {
      state.timezone = sel.value;
      state.selectedDate = null;
      state.selectedSlot = null;
      renderCalendar();

  function renderCalendar() {
    const area = $('#calArea');
    if (!area) return;

    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const firstDay = new Date(state.calYear, state.calMonth, 1);
    const lastDay = new Date(state.calYear, state.calMonth + 1, 0);
    const startDow = firstDay.getDay();
    const daysInMonth = lastDay.getDate();

    const isPastMonth = state.calYear < now.getFullYear() ||
      (state.calYear === now.getFullYear() && state.calMonth < now.getMonth());

    let html = `
      <div class="cal-header">
        <span class="cal-month">${MONTHS[state.calMonth]} ${state.calYear}</span>
        <div class="cal-nav">
          <button id="calPrev" ${isPastMonth || (state.calYear === now.getFullYear() && state.calMonth === now.getMonth()) ? 'disabled' : ''}>${icons.chevLeft}</button>
          <button id="calNext">${icons.chevRight}</button>
        </div>
      </div>
      <div class="cal-grid">`;

    DAYS.forEach(d => { html += `<div class="cal-day-label">${d}</div>`; });

    // Empty cells before first day
    for (let i = 0; i < startDow; i++) html += '<div class="cal-day empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(state.calYear, state.calMonth, d);
      const dateStr = formatDateLocal(date);
      const isPast = date < today;
      const isToday = date.getTime() === today.getTime();
      const dow = date.getDay();

      // Check if day has availability
      const hasAvail = state.availability.some(a => a.day_of_week === dow);
      // Check overrides
      const override = state.overrides.find(o => o.override_date === dateStr);
      const isBlocked = override && override.is_blocked;

      const disabled = isPast || (!hasAvail && !override) || isBlocked || (override && override.is_blocked);
      const isSelected = state.selectedDate === dateStr;

      let cls = 'cal-day';
      if (disabled) cls += ' disabled';
      if (isToday) cls += ' today';
      if (isSelected) cls += ' selected';

      html += `<div class="${cls}" data-date="${dateStr}" ${disabled ? '' : 'tabindex="0" role="button"'}>${d}</div>`;
    }

    html += '</div>';
    area.innerHTML = html;

    // Event listeners
    const prev = $('#calPrev');
    const next = $('#calNext');
    if (prev) prev.addEventListener('click', () => {
      state.calMonth--;
      if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
      renderCalendar();
    });
    if (next) next.addEventListener('click', () => {
      state.calMonth++;
      if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
      renderCalendar();
    });

    $$('.cal-day:not(.disabled):not(.empty)', area).forEach(el => {
      const handler = () => {
        state.selectedDate = el.dataset.date;
        state.selectedSlot = null;
        // Go to time step
        state.step = 2;
        updateURL();
        renderStep();
      };
      el.addEventListener('click', handler);
      el.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
    });
  }

  // ─── Step 2: Time ───
  async function renderTimeStep() {
    const t = state.selectedType;
    const dateParts = state.selectedDate.split('-');
    const dateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
    const dateLabel = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    app.innerHTML = `
      <div class="step-container">
        <button class="back-btn" id="backToDate">${icons.arrowLeft} Back to calendar</button>
        <div class="steps-indicator">

          <div class="step-dot"></div>

        </div>
      </div>`;

    $('#backToDate').addEventListener('click', () => {
      state.step = 1;
      updateURL();
      renderStep();
    });

    // Load existing bookings for this date
    const dayStart = state.selectedDate + 'T00:00:00Z';
    const dayEnd = state.selectedDate + 'T23:59:59Z';

    const { data: bookings } = await sb
      .from('bookings')
      .select('start_time,end_time')
      .eq('booking_type_id', t.id)
      .in('status', ['confirmed', 'pending'])
      .gte('start_time', dayStart)
      .lte('start_time', dayEnd);

    state.existingBookings = bookings || [];

    const slots = calculateSlots(state.selectedDate, t);
    renderSlots(slots);
  }

  function calculateSlots(dateStr, type) {
    const dateParts = dateStr.split('-');
    const dateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
    const dow = dateObj.getDay();
    const duration = type.duration_minutes || 30;
    const interval = type.slot_interval_minutes || duration;
    const buffer = type.buffer_minutes || 0;
    const minNotice = type.min_notice_hours || 1;

    // Get availability windows for this day
    let windows = state.availability.filter(a => a.day_of_week === dow);

    // Check for overrides
    const override = state.overrides.find(o => o.override_date === dateStr);
    if (override) {
      if (override.is_blocked) return [];
      if (override.start_time && override.end_time) {
        windows = [{ start_time: override.start_time, end_time: override.end_time }];
      }
    }

    const ownerTz = state.settings.timezone || 'America/New_York';
    const now = new Date();
    const minNoticeTime = new Date(now.getTime() + minNotice * 60 * 60 * 1000);

    const slots = [];

    windows.forEach(w => {
      // Parse window times (in owner timezone)
      const startParts = w.start_time.split(':');
      const endParts = w.end_time.split(':');

      // Create date objects in owner timezone using a helper
      let cursor = dateInTz(dateStr, w.start_time, ownerTz);
      const windowEnd = dateInTz(dateStr, w.end_time, ownerTz);

      while (cursor.getTime() + duration * 60000 <= windowEnd.getTime()) {
        const slotStart = new Date(cursor);
        const slotEnd = new Date(cursor.getTime() + duration * 60000);

        // Check min notice
        if (slotStart <= minNoticeTime) {
          cursor = new Date(cursor.getTime() + interval * 60000);
          continue;
        }

        // Check conflicts with existing bookings (including buffer)
        const hasConflict = state.existingBookings.some(b => {
          const bStart = new Date(b.start_time);
          const bEnd = new Date(b.end_time);
          const bufferedStart = new Date(bStart.getTime() - buffer * 60000);
          const bufferedEnd = new Date(bEnd.getTime() + buffer * 60000);
          return slotStart < bufferedEnd && slotEnd > bufferedStart;
        });

        if (!hasConflict) {
          slots.push({
            start: slotStart,
            end: slotEnd,
            label: formatTimeInTz(slotStart, state.timezone),
          });
        }

        cursor = new Date(cursor.getTime() + interval * 60000);
      }
    });

    return slots;
  }

  function renderSlots(slots) {
    const area = $('#slotsArea');
    if (!area) return;

    if (!slots.length) {
      area.innerHTML = `
        <div class="no-slots">
          ${icons.calendar}
          <p>No available times on this date.<br>Please select another day.</p>
        </div>`;
      return;
    }

    area.innerHTML = '<div class="slots-grid">' + slots.map((s, i) => {
      return `<button class="slot-btn" data-idx="${i}">${s.label}</button>`;
    }).join('') + '</div>';

    $$('.slot-btn', area).forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        state.selectedSlot = slots[idx];
        $$('.slot-btn', area).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        // Brief delay then move to step 3
        setTimeout(() => {
          state.step = 3;
          updateURL();
          renderStep();
        }, 300);
      });
    });
  }

      }
    });

    app.innerHTML = `
      <div class="step-container">
        <button class="back-btn" id="backToTime">${icons.arrowLeft} Back to time selection</button>
        <div class="steps-indicator">
          <div class="step-dot done"></div>
          <div class="step-dot done"></div>
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
        </div>
        <div class="glass-card" style="padding:28px">
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:20px;text-align:center">Your Details</h2>
          <form id="detailsForm">
            <div class="form-group">
              <label class="form-label" for="fName">Name *</label>
              <input class="form-input" type="text" id="fName" required placeholder="Your full name" value="${esc(state.formData.name)}">
            </div>

              <input class="form-input" type="email" id="fEmail" required placeholder="you@example.com" value="${esc(state.formData.email)}">
            </div>
            <div class="form-group">
              <label class="form-label" for="fPhone">Phone</label>
              <input class="form-input" type="tel" id="fPhone" placeholder="(optional)" value="${esc(state.formData.phone)}">
            </div>
            ${fieldsHtml}
            <div class="form-group">
              <label class="form-label" for="fNotes">What would you like to discuss?</label>
              <textarea class="form-input" id="fNotes" placeholder="Share any context or questions...">${esc(state.formData.notes)}</textarea>
            </div>
            <button type="submit" class="btn-gold" style="width:100%;justify-content:center;margin-top:8px">Continue to Confirmation</button>
          </form>
        </div>
      </div>`;

    $('#backToTime').addEventListener('click', () => {
      saveFormData();
      state.step = 2;
      updateURL();
      renderStep();
    });

    $('#detailsForm').addEventListener('submit', e => {
      e.preventDefault();
      saveFormData();
      if (!state.formData.name.trim() || !state.formData.email.trim()) {
        showToast('Please fill in all required fields');
        return;
      }
      state.step = 4;
      updateURL();
      renderStep();
    });
  }

  function saveFormData() {
    const name = $('#fName');
    const email = $('#fEmail');
    const phone = $('#fPhone');
    const notes = $('#fNotes');
    if (name) state.formData.name = name.value;
    if (email) state.formData.email = email.value;
    if (phone) state.formData.phone = phone.value;
    if (notes) state.formData.notes = notes.value;

    // Custom fields
    const t = state.selectedType;
    const customFields = t.custom_fields || [];
    customFields.forEach((f, i) => {
      const el = $('#custom_' + i);
      if (el) state.formData.custom[f.label] = el.value;
    });
  }

  // ─── Step 4: Confirm ───
  function renderConfirmStep() {
    const t = state.selectedType;
    const s = state.selectedSlot;
    const dur = t.duration_minutes || 30;
    const price = t.price_cents ? '$' + (t.price_cents / 100).toFixed(t.price_cents % 100 === 0 ? 0 : 2) : 'Free';

    const dateLabel = s.start.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
      timeZone: state.timezone
    });
    const timeLabel = formatTimeInTz(s.start, state.timezone) + ' - ' + formatTimeInTz(s.end, state.timezone);
    const tzAbbr = getTimezoneAbbr(s.start, state.timezone);

    const policy = state.settings.cancellation_policy || '';

    app.innerHTML = `
      <div class="step-container">
        <button class="back-btn" id="backToDetails">${icons.arrowLeft} Back to details</button>
        <div class="steps-indicator">
          <div class="step-dot done"></div>
          <div class="step-dot done"></div>
          <div class="step-dot done"></div>
          <div class="step-dot active"></div>
        </div>
        <div class="glass-card" style="padding:28px">
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:20px;text-align:center">Confirm Your Booking</h2>
          <div class="summary-card">
            <div class="summary-row">
              <span class="summary-label">Meeting</span>
              <span class="summary-value">${esc(t.name)}</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Date</span>
              <span class="summary-value">${dateLabel}</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Time</span>
              <span class="summary-value">${timeLabel} ${tzAbbr}</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Duration</span>
              <span class="summary-value">${dur} minutes</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Location</span>
              <span class="summary-value">${locationLabel(t.location_type)}</span>
            </div>
            ${t.price_cents ? `<div class="summary-row">
              <span class="summary-label">Price</span>
              <span class="summary-value" style="color:var(--gold);font-weight:700">${price}</span>
            </div>` : ''}
            <div class="summary-row">
              <span class="summary-label">Name</span>
              <span class="summary-value">${esc(state.formData.name)}</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Email</span>
              <span class="summary-value">${esc(state.formData.email)}</span>
            </div>
          </div>
          ${policy ? `<div class="cancel-policy">${esc(policy)}</div>` : ''}
          <button class="btn-gold" id="confirmBtn" style="width:100%;justify-content:center;margin-top:20px">
            ${t.price_cents ? 'Pay & Confirm' : 'Confirm Booking'}
          </button>
        </div>
      </div>`;

    $('#backToDetails').addEventListener('click', () => {
      state.step = 3;
      updateURL();
      renderStep();
    });

    $('#confirmBtn').addEventListener('click', submitBooking);
  }

  async function submitBooking() {
    const btn = $('#confirmBtn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Booking...';

    const t = state.selectedType;
    const s = state.selectedSlot;

    // Generate tokens
    const rescheduleToken = generateToken();
    const cancelToken = generateToken();

    // Build custom responses
    const customResponses = {};
    if (state.formData.notes) customResponses['Notes'] = state.formData.notes;
    Object.entries(state.formData.custom).forEach(([k, v]) => {
      if (v) customResponses[k] = v;
    });

    const payload = {
      booking_type_id: t.id,
      booker_name: state.formData.name.trim(),
      booker_email: state.formData.email.trim().toLowerCase(),
      booker_phone: state.formData.phone.trim() || null,
      start_time: s.start.toISOString(),
      end_time: s.end.toISOString(),
      timezone: state.timezone,
      status: t.price_cents ? 'pending' : 'confirmed',
      custom_responses: Object.keys(customResponses).length ? customResponses : null,
      reschedule_token: rescheduleToken,
      cancel_token: cancelToken,
    };

    const { data, error } = await sb.from('bookings').insert(payload).select().single();

    if (error) {
      showToast('Failed to create booking. Please try again.');
      btn.disabled = false;
      btn.innerHTML = t.price_cents ? 'Pay & Confirm' : 'Confirm Booking';
      return;
    }

    state.booking = { ...data, type: t };

    // If paid, redirect to payment link if configured
    if (t.price_cents && t.payment_link) {
      window.location.href = t.payment_link + '?client_reference_id=' + data.id;
      return;
    }

    state.step = 5;
    updateURL();
    renderStep();
  }

  // ─── Step 5: Success ───
  function renderSuccessStep() {
    const b = state.booking;
    const t = b.type || state.selectedType;
    const start = new Date(b.start_time);
    const end = new Date(b.end_time);
    const dur = t.duration_minutes || 30;

    const dateLabel = start.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
      timeZone: state.timezone
    });
    const timeLabel = formatTimeInTz(start, state.timezone) + ' - ' + formatTimeInTz(end, state.timezone);
    const tzAbbr = getTimezoneAbbr(start, state.timezone);

    const gcalUrl = buildGoogleCalUrl(t.name, start, end, t.description || '', locationLabel(t.location_type));

    const bookPageUrl = location.origin + '/book';

    app.innerHTML = `
      <div class="step-container">
        <div class="glass-card" style="padding:36px">
          <div class="success-wrap">
            <div class="success-check">${icons.check}</div>
            <h2 class="success-title">You're Booked!</h2>
            <p class="success-sub">A confirmation will be sent to <strong>${esc(b.booker_email)}</strong></p>

            <div class="summary-card" style="text-align:left">
              <div class="summary-row">
                <span class="summary-label">Meeting</span>
                <span class="summary-value">${esc(t.name)}</span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Date</span>
                <span class="summary-value">${dateLabel}</span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Time</span>
                <span class="summary-value">${timeLabel} ${tzAbbr}</span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Duration</span>
                <span class="summary-value">${dur} minutes</span>
              </div>
            </div>

            <div class="cal-links">
              <a href="${gcalUrl}" target="_blank" rel="noopener" class="btn-outline">${icons.calendar} Google Calendar</a>
              <button class="btn-outline" id="icsBtn">${icons.download} Download .ics</button>
            </div>

            <div class="manage-links">
              <a href="${bookPageUrl}?action=reschedule&id=${b.id}&token=${b.reschedule_token}">Reschedule</a>
              <a href="${bookPageUrl}?action=cancel&id=${b.id}&token=${b.cancel_token}">Cancel</a>
              <a href="${bookPageUrl}">Back to booking page</a>
            </div>
          </div>
        </div>
      </div>`;

    const icsBtn = $('#icsBtn');
    if (icsBtn) {
      icsBtn.addEventListener('click', () => {
        const ics = buildICS(t.name, start, end, t.description || '', locationLabel(t.location_type), b.booker_email);
        downloadICS(ics, t.slug || 'booking');
      });
    }
  }

  // ─── Reschedule ───
  async function initReschedule(id, token) {
    state.mode = 'reschedule';
    app.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="color:var(--gold)"></div></div>';

    const { data: booking, error } = await sb
      .from('bookings')
      .select('*, booking_types(*)')
      .eq('id', id)
      .eq('reschedule_token', token)
      .single();

    if (error || !booking) {
      app.innerHTML = `
        <div class="action-card">
          <h2 class="action-title">Invalid Link</h2>
          <p class="action-sub">This reschedule link is invalid or has expired.</p>
          <a href="/book" class="btn-outline">Back to booking page</a>
        </div>`;
      return;
    }

    if (booking.status === 'cancelled') {
      app.innerHTML = `
        <div class="action-card">
          <h2 class="action-title">Booking Cancelled</h2>
          <p class="action-sub">This booking has already been cancelled and cannot be rescheduled.</p>
          <a href="/book" class="btn-outline">Book a new meeting</a>
        </div>`;
      return;
    }

    // Check reschedule limit
    const maxReschedules = booking.booking_types?.max_reschedules;
    if (maxReschedules !== null && maxReschedules !== undefined && (booking.reschedule_count || 0) >= maxReschedules) {
      app.innerHTML = `
        <div class="action-card">
          <h2 class="action-title">Reschedule Limit Reached</h2>
          <p class="action-sub">You have reached the maximum number of reschedules for this booking.</p>
          <a href="/book" class="btn-outline">Back to booking page</a>
        </div>`;
      return;
    }

    // Set up for flow
    state.rescheduleBooking = booking;
    state.selectedType = booking.booking_types;
    state.formData.name = booking.booker_name;
    state.formData.email = booking.booker_email;
    state.formData.phone = booking.booker_phone || '';

    // Load availability
    const [avail, overrides] = await Promise.all([
      sb.from('booking_availability').select('*').eq('is_active', true),
      sb.from('booking_overrides').select('*'),
    ]);
    state.availability = avail.data || [];
    state.overrides = overrides.data || [];

    const now = new Date();
    state.calMonth = now.getMonth();
    state.calYear = now.getFullYear();
    state.step = 1;
    state.mode = 'flow';

    // Show current booking info, then calendar
    renderStep();
  }

  // ─── Cancel ───
  async function initCancel(id, token) {
    state.mode = 'cancel';
    app.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="color:var(--gold)"></div></div>';

    const { data: booking, error } = await sb
      .from('bookings')
      .select('*, booking_types(name, duration_minutes)')
      .eq('id', id)
      .eq('cancel_token', token)
      .single();

    if (error || !booking) {
      app.innerHTML = `
        <div class="action-card">
          <h2 class="action-title">Invalid Link</h2>
          <p class="action-sub">This cancellation link is invalid or has expired.</p>
          <a href="/book" class="btn-outline">Back to booking page</a>
        </div>`;
      return;
    }

    if (booking.status === 'cancelled') {
      app.innerHTML = `
        <div class="action-card">
          <h2 class="action-title">Already Cancelled</h2>
          <p class="action-sub">This booking has already been cancelled.</p>
          <a href="/book" class="btn-outline">Book a new meeting</a>
        </div>`;
      return;
    }

    state.cancelBooking = booking;
    renderCancelView();
  }

  function renderCancelView() {
    const b = state.cancelBooking;
    const start = new Date(b.start_time);
    const tz = b.timezone || state.timezone;
    const dateLabel = start.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
      timeZone: tz
    });
    const timeLabel = formatTimeInTz(start, tz);
    const name = b.booking_types?.name || 'Meeting';

    app.innerHTML = `
      <div class="action-card">
        <h2 class="action-title">Cancel Booking</h2>
        <p class="action-sub">Are you sure you want to cancel?</p>
        <div class="summary-card" style="text-align:left;margin-bottom:24px">
          <div class="summary-row">
            <span class="summary-label">Meeting</span>
            <span class="summary-value">${esc(name)}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Date</span>
            <span class="summary-value">${dateLabel}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Time</span>
            <span class="summary-value">${timeLabel}</span>
          </div>
        </div>
        <div class="form-group" style="text-align:left">
          <label class="form-label" for="cancelReason">Reason for cancellation</label>
          <select class="form-input" id="cancelReason">
            <option value="">Select a reason (optional)</option>
            <option value="schedule_conflict">Schedule conflict</option>
            <option value="no_longer_needed">No longer needed</option>
            <option value="found_alternative">Found an alternative</option>
            <option value="personal_reasons">Personal reasons</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="action-btns" style="margin-top:20px">
          <a href="/book" class="btn-outline">Keep Booking</a>
          <button class="btn-danger" id="cancelConfirmBtn">Cancel Booking</button>
        </div>
      </div>`;

    $('#cancelConfirmBtn').addEventListener('click', async () => {
      const btn = $('#cancelConfirmBtn');
      btn.disabled = true;
      btn.textContent = 'Cancelling...';

      const reason = $('#cancelReason')?.value || null;

      const { error } = await sb
        .from('bookings')
        .update({
          status: 'cancelled',
          cancelled_at: new Date().toISOString(),
          cancel_reason: reason,
        })
        .eq('id', state.cancelBooking.id);

      if (error) {
        showToast('Failed to cancel. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Cancel Booking';
        return;
      }

      app.innerHTML = `
        <div class="action-card">
          <div style="width:48px;height:48px;margin:0 auto 16px;border-radius:50%;background:rgba(239,68,68,0.1);border:2px solid var(--error);display:flex;align-items:center;justify-content:center">
            ${icons.x}
          </div>
          <h2 class="action-title">Booking Cancelled</h2>
          <p class="action-sub">Your booking has been cancelled successfully.</p>
          <a href="/book" class="btn-gold" style="display:inline-flex;margin-top:16px">Book a New Meeting</a>
        </div>`;
    });
  }

  // ─── Helpers ───
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function formatDateLocal(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  }

  function dateInTz(dateStr, timeStr, tz) {
    // Build a date string and parse in the target timezone
    const dtStr = dateStr + 'T' + timeStr;
    // Use a formatter to find the offset
    const fakeDate = new Date(dtStr + 'Z');
    const formatter = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false,
    });
    // Approach: create date as if local, then adjust
    // Simpler: just use the timezone offset calculation
    const parts = timeStr.split(':');
    const h = parseInt(parts[0]);
    const m = parseInt(parts[1] || '0');

    // Get the UTC offset for the target timezone on this date
    const refDate = new Date(dateStr + 'T12:00:00Z');
    const utcStr = refDate.toLocaleString('en-US', { timeZone: 'UTC' });
    const tzStr = refDate.toLocaleString('en-US', { timeZone: tz });
    const utcDate = new Date(utcStr);
    const tzDate = new Date(tzStr);
    const offsetMs = tzDate.getTime() - utcDate.getTime();

    // The owner says "9:00 AM EST" which is 9:00 in their tz
    // We need UTC = owner_time - offset
    const ownerMs = new Date(dateStr + 'T00:00:00Z').getTime() + h * 3600000 + m * 60000;
    return new Date(ownerMs - offsetMs);
  }

  function formatTimeInTz(date, tz) {
    return date.toLocaleTimeString('en-US', {
      timeZone: tz,
      hour: 'numeric',
      minute: '2-digit',
      hour12: true,
    });
  }

  function getTimezoneAbbr(date, tz) {
    const parts = date.toLocaleTimeString('en-US', { timeZone: tz, timeZoneName: 'short' }).split(' ');
    return parts[parts.length - 1] || '';
  }

  function generateToken() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let token = '';
    const arr = new Uint8Array(32);
    crypto.getRandomValues(arr);
    arr.forEach(b => { token += chars[b % chars.length]; });
    return token;
  }

  function updateURL() {
    if (state.mode === 'flow' && state.selectedType) {
      const params = new URLSearchParams(location.search);
      params.set('type', state.selectedType.slug);
      params.set('step', state.step);
      history.replaceState({}, '', '/book?' + params.toString());
    }
  }

  function buildGoogleCalUrl(title, start, end, desc, location) {
    const fmt = d => d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: title,
      dates: fmt(start) + '/' + fmt(end),
      details: desc,
      location: location,
    });
    return 'https://calendar.google.com/calendar/event?' + params.toString();
  }

  function buildICS(title, start, end, desc, location, email) {
    const fmt = d => d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
    const now = new Date();
    return [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//KnightOps//Booking//EN',
      'CALSCALE:GREGORIAN',
      'METHOD:REQUEST',
      'BEGIN:VEVENT',
      'DTSTART:' + fmt(start),
      'DTEND:' + fmt(end),
      'DTSTAMP:' + fmt(now),
      'UID:' + generateToken() + '@knightops.biz',
      'SUMMARY:' + title,
      'DESCRIPTION:' + (desc || '').replace(/\n/g, '\\n'),
      'LOCATION:' + location,
      'ATTENDEE;RSVP=TRUE:mailto:' + email,
      'STATUS:CONFIRMED',
      'END:VEVENT',
      'END:VCALENDAR',
    ].join('\r\n');
  }

  function downloadICS(content, slug) {
    const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = slug + '.ics';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ─── Browser back button ───
  window.addEventListener('popstate', () => {
    const route = parseURL();
    if (route.mode === 'hub') {
      initHub();
    } else if (route.mode === 'flow') {
      if (state.selectedType && state.selectedType.slug === route.slug) {
        // Same type, just go back a step if possible
        if (state.step > 1) {
          state.step--;
          renderStep();
        }
      } else {
        initFlow(route.slug);
      }
    }
  });

  // ─── Start ───
  init();
})();
</script>
