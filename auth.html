<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Knight Ops</title>
<style>
:root{--accent:#C8A456;--accent-glow:rgba(200,164,86,0.3);--bg:#0A0A0B;--surface:#111113;--surface-2:#1A1A1F;--text:#F5F5F5;--text-muted:#999;--border:rgba(200,164,86,0.15);--error:#E53935;--success:#4CAF50}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Background glow */
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);opacity:0.1;pointer-events:none}

.auth-container{width:100%;max-width:420px;padding:2rem}

/* Logo */
.auth-logo{text-align:center;margin-bottom:2.5rem}
.auth-logo a{text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:12px}
.shield{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#A08636);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--bg);font-weight:800}
.auth-logo .brand{font-size:1.3rem;font-weight:700;color:var(--text);letter-spacing:2px}

/* Card */
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#A08636,var(--accent))}

.auth-card h1{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.5rem}
.auth-card .subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem}

/* Tabs */
.auth-tabs{display:flex;gap:0;margin-bottom:2rem;background:var(--surface-2);border-radius:10px;padding:4px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:0.9rem;font-weight:600;cursor:pointer;border-radius:8px;transition:all 0.3s;color:var(--text-muted);border:none;background:none}
.auth-tab.active{background:var(--accent);color:var(--bg)}

/* Form */
.auth-form{display:flex;flex-direction:column;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:0.85rem;color:var(--text-muted);font-weight:500}
.form-group input{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:0.95rem;color:var(--text);font-family:inherit;transition:all 0.3s;outline:none}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,164,86,0.1)}
.form-group input::placeholder{color:#555}

.auth-btn{background:linear-gradient(135deg,var(--accent),#A08636);color:var(--bg);border:none;padding:14px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:0.5rem;letter-spacing:0.5px}
.auth-btn:hover{box-shadow:0 0 30px var(--accent-glow);transform:translateY(-2px)}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Magic link */
.divider{display:flex;align-items:center;gap:1rem;margin:1rem 0;color:var(--text-muted);font-size:0.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.magic-btn{background:var(--surface-2);border:1px solid var(--border);padding:12px;border-radius:10px;font-size:0.9rem;color:var(--text);cursor:pointer;transition:all 0.3s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.magic-btn:hover{border-color:var(--accent);background:rgba(200,164,86,0.05)}

/* Status */
.auth-status{text-align:center;padding:12px;border-radius:10px;font-size:0.9rem;margin-top:1rem;display:none}
.auth-status.error{display:block;background:rgba(229,57,53,0.1);border:1px solid rgba(229,57,53,0.3);color:var(--error)}
.auth-status.success{display:block;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);color:var(--success)}

/* Footer */
.auth-footer{text-align:center;margin-top:2rem;font-size:0.85rem;color:var(--text-muted)}
.auth-footer a{color:var(--accent);text-decoration:none}

/* Hidden */
.hidden{display:none!important}

@media(max-width:480px){
  .auth-container{padding:1rem}
  .auth-card{padding:2rem 1.5rem;border-radius:16px}
}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <a href="/">
      <div class="shield">K</div>
      <span class="brand">KNIGHT OPS</span>
    </a>
  </div>

  <div class="auth-card">
    <h1 id="authTitle">Welcome Back</h1>
    <p class="subtitle" id="authSubtitle">Sign in to access your dashboard</p>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
      <div class="divider">or</div>
      <button type="button" class="magic-btn" onclick="sendMagicLink('login')">&#9889; Send Magic Link</button>
    </form>

    <!-- Signup Form -->
    <form class="auth-form hidden" id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a password (min 8 characters)" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
      <div class="divider">or</div>
      <button type="button" class="magic-btn" onclick="sendMagicLink('signup')">&#9889; Send Magic Link</button>
    </form>

    <div class="auth-status" id="authStatus"></div>
  </div>

  <div class="auth-footer">
    <p><a href="/">Back to KnightOps.biz</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase Init ──
const SUPABASE_URL = 'https://trpnlkntvulkjerevngm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRycG5sa250dnVsa2plcmV2bmdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Njg1MDQsImV4cCI6MjA5MDA0NDUwNH0.q9UrZDjbl7c3xC1eTsq46Qg5MmWNogot2ByZ9c_54cM';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

console.log('[Auth] Page loaded, checking session...');

// ── Handle auth state changes (magic link, OAuth, etc.) ──
supabase.auth.onAuthStateChange((event, session) => {
  console.log('[Auth] State change:', event, session?.user?.email);
  if (event === 'SIGNED_IN' && session) {
    showStatus('Success! Redirecting...', 'success');
    redirectByRole(session.user.id);
  }
});

// ── Check if already logged in ──
(async function checkSession() {
  try {
    const { data: { session }, error } = await supabase.auth.getSession();
    console.log('[Auth] Session check:', session ? session.user.email : 'none', error || '');
    if (session) {
      redirectByRole(session.user.id);
    }
  } catch(e) {
    console.error('[Auth] Session check failed:', e);
  }
})();

async function redirectByRole(userId) {
  const { data: profile } = await supabase
    .from('profiles')
    .select('role')
    .eq('id', userId)
    .single();

  if (profile && profile.role === 'admin') {
    window.location.href = '/admin';
  } else {
    window.location.href = '/portal';
  }
}

// ── Tab Switching ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const title = document.getElementById('authTitle');
  const subtitle = document.getElementById('authSubtitle');

  if (tab === 'login') {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    title.textContent = 'Welcome Back';
    subtitle.textContent = 'Sign in to access your dashboard';
  } else {
    loginForm.classList.add('hidden');
    signupForm.classList.remove('hidden');
    title.textContent = 'Get Started';
    subtitle.textContent = 'Create your Knight Ops account';
  }
  clearStatus();
}

// ── Login ──
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  clearStatus();

  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  console.log('[Auth] Attempting login for:', email);
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    console.error('[Auth] Login error:', error.message, error);
    showStatus(error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }

  console.log('[Auth] Login success:', data.user.email, data.user.id);
  showStatus('Success! Redirecting...', 'success');
  redirectByRole(data.user.id);
}

// ── Signup ──
async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  clearStatus();

  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { full_name: name, role: 'client' },
      emailRedirectTo: window.location.origin + '/auth'
    }
  });

  if (error) {
    showStatus(error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
    return;
  }

  if (data.user && !data.user.confirmed_at) {
    showStatus('Check your email to confirm your account!', 'success');
  } else {
    showStatus('Account created! Redirecting...', 'success');
    setTimeout(() => redirectByRole(data.user.id), 1500);
  }

  btn.disabled = false;
  btn.textContent = 'Create Account';
}

// ── Magic Link ──
async function sendMagicLink(context) {
  const emailInput = context === 'login'
    ? document.getElementById('loginEmail')
    : document.getElementById('signupEmail');

  const email = emailInput.value;
  if (!email) {
    showStatus('Enter your email first', 'error');
    return;
  }

  clearStatus();
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/auth' }
  });

  if (error) {
    showStatus(error.message, 'error');
  } else {
    showStatus('Magic link sent! Check your inbox.', 'success');
  }
}

// ── Handle magic link redirect (hash or query params) ──
(async function handleMagicLinkRedirect() {
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);
  // Handle both legacy hash-based and PKCE query-based tokens
  if ((hash && hash.includes('access_token')) || params.has('code') || params.has('token')) {
    console.log('[Auth] Magic link redirect detected');
    // Small delay to let Supabase process the token
    setTimeout(async () => {
      const { data: { session }, error } = await supabase.auth.getSession();
      console.log('[Auth] Magic link session:', session?.user?.email, error || '');
      if (session) {
        redirectByRole(session.user.id);
      } else if (error) {
        showStatus('Magic link expired or invalid. Try again.', 'error');
      }
    }, 500);
  }
})();

// ── Status Messages ──
function showStatus(message, type) {
  const el = document.getElementById('authStatus');
  el.textContent = message;
  el.className = 'auth-status ' + type;
}
function clearStatus() {
  const el = document.getElementById('authStatus');
  el.className = 'auth-status';
  el.textContent = '';
}
</script>

</body>
</html>
