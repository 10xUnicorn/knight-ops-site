<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Joining the Claude AI Assistant Workshop&hellip;</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="refresh" content="0;url=https://us06web.zoom.us/j/85937326562?jst=2">
<style>
  html,body{margin:0;height:100%;background:#05061a;color:#EDEAE0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  .box{height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px}
  h1{font-weight:800;font-size:1.6rem;margin:0 0 12px;color:#C9922A}
  p{color:#A1A1AA;font-size:.95rem;margin:0 0 24px;max-width:440px;line-height:1.6}
  a{color:#C9922A}
  .spin{width:36px;height:36px;border:3px solid rgba(201,146,42,.2);
    border-top-color:#C9922A;border-radius:50%;animation:s .7s linear infinite;
    margin-bottom:24px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="box">
    <div class="spin"></div>
    <h1>Taking you to the workshop&hellip;</h1>
    <p id="msg">If you're not redirected automatically, the direct Zoom link is in your confirmation email.</p>
  </div>
  <script>
    var ZOOM_URL = 'https://us06web.zoom.us/j/85937326562?jst=2';
    if (ZOOM_URL) {
      document.getElementById('msg').innerHTML =
        'If you\'re not redirected automatically, <a href="' + ZOOM_URL + '">click here to join the Zoom call</a>.';
      window.location.replace(ZOOM_URL);
    } else {
      document.querySelector('.spin').style.display = 'none';
      document.querySelector('h1').textContent = 'The Zoom room opens closer to the session.';
      document.getElementById('msg').innerHTML =
        'Workshop days: <b style="color:#EDEAE0">Thu July 23 &amp; Fri July 24 · 11:00 AM – 1:00 PM PT</b>.<br>' +
        'This page will redirect straight into Zoom once the room is live. The direct link will also be in your email before day 1.';
    }
  </script>
</body>
</html>
