<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knight Ops Partner Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0A0A0B;
      --bg-secondary: #111113;
      --bg-tertiary: #18181B;
      --bg-card: #1C1C1F;
      --bg-card-hover: #222225;
      --border: #2A2A2E;
      --border-light: #3A3A3F;
      --text-primary: #F4F4F5;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      --accent: #C8A456;
      --accent-hover: #D4B56A;
      --accent-subtle: rgba(200, 164, 86, 0.1);
      --accent-border: rgba(200, 164, 86, 0.25);
      --white: #FFFFFF;
      --success: #22C55E;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --purple: #8b5cf6;
      --green: #10b981;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* ============ TOP BAR ============ */
    .top-bar {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -1px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo span {
      color: var(--accent);
    }

    .logo:hover {
      color: var(--accent);
    }

    .top-bar-right {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .partner-name {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .sign-out-btn {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .sign-out-btn:hover {
      background-color: var(--bg-card);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ============ LOGIN SCREEN ============ */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-primary);
      padding: 2rem;
    }

    .login-box {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .login-box h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .login-box p {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .login-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      margin-bottom: 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--accent);
      background-color: var(--bg-secondary);
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .login-message {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 1.5rem;
    }

    /* ============ MAIN LAYOUT ============ */
    .dashboard-container {
      min-height: 100vh;
      background-color: var(--bg-primary);
    }

    .dashboard-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ============ TAB BAR ============ */
    .tab-bar {
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }

    .tab-button {
      background-color: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      white-space: nowrap;
      position: relative;
    }

    .tab-button:hover {
      color: var(--text-primary);
    }

    .tab-button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ============ TAB CONTENT ============ */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============ STAT CARDS ============ */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      border-left: 3px solid var(--accent);
    }

    .stat-card:hover {
      background-color: var(--bg-card-hover);
      border-color: var(--border-light);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ============ ACTIVITY FEED ============ */
    .activity-section {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .activity-item {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      background-color: var(--bg-tertiary);
      border-radius: 8px;
      border-left: 3px solid var(--border);
      transition: all 0.3s ease;
    }

    .activity-item:hover {
      border-left-color: var(--accent);
      background-color: var(--bg-secondary);
    }

    .activity-icon {
      width: 32px;
      height: 32px;
      background-color: var(--accent-subtle);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .activity-content {
      flex: 1;
      min-width: 0;
    }

    .activity-title {
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .activity-time {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state p {
      margin-bottom: 0.5rem;
    }

    /* ============ QUICK LINKS ============ */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .quick-link-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .quick-link-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .quick-link-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      word-break: break-all;
      background-color: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .copy-btn {
      background-color: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      align-self: flex-start;
    }

    .copy-btn:hover {
      background-color: var(--accent-hover);
    }

    .copy-btn.copied {
      background-color: var(--success);
    }

    /* ============ TABLES ============ */
    .table-wrapper {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .filter-bar {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background-color: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      background-color: var(--bg-tertiary);
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    .table tbody tr {
      transition: all 0.3s ease;
    }

    .table tbody tr:hover {
      background-color: var(--bg-tertiary);
    }

    .table tbody tr:last-child td {
      border-bottom: none;
    }

    /* ============ BADGES ============ */
    .badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      width: fit-content;
    }

    .badge-pending {
      background-color: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-contacted {
      background-color: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-qualified {
      background-color: rgba(139, 92, 246, 0.15);
      color: #8b5cf6;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    .badge-converted {
      background-color: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .badge-lost {
      background-color: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .badge-approved {
      background-color: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .badge-paid {
      background-color: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-rejected {
      background-color: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .badge-assessment {
      background-color: rgba(139, 92, 246, 0.15);
      color: #8b5cf6;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    .badge-referral {
      background-color: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-direct {
      background-color: rgba(161, 161, 170, 0.15);
      color: #a1a1aa;
      border: 1px solid rgba(161, 161, 170, 0.3);
    }

    .badge-booking {
      background-color: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge-architect {
      background-color: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-vibe_coder {
      background-color: rgba(139, 92, 246, 0.15);
      color: #8b5cf6;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    .badge-blitz_builder {
      background-color: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-scholar {
      background-color: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    /* ============ SUMMARY BAR ============ */
    .summary-bar {
      background-color: var(--bg-tertiary);
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .summary-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      color: var(--accent);
      font-size: 1.5rem;
      font-weight: 700;
    }

    /* ============ FORM ELEMENTS ============ */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .form-label {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-input {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background-color: var(--bg-secondary);
    }

    .form-input:disabled {
      background-color: var(--bg-card);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .form-readonly {
      background-color: var(--bg-card);
      color: var(--text-secondary);
    }

    .form-button {
      background-color: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .form-button:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .form-button:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    /* ============ TEMPLATE CARDS ============ */
    .template-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .template-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .template-title {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .template-content {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      padding: 1rem;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
    }

    .template-copy-btn {
      background-color: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-border);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .template-copy-btn:hover {
      background-color: var(--accent-subtle);
      border-color: var(--accent);
    }

    .template-copy-btn.copied {
      background-color: rgba(34, 197, 94, 0.1);
      color: var(--success);
      border-color: var(--success);
    }

    /* ============ NOTIFICATIONS ============ */
    .notification-item {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .notification-item.unread {
      border-left: 3px solid var(--accent);
      background-color: var(--accent-subtle);
    }

    .notification-item:hover {
      background-color: var(--bg-secondary);
      border-color: var(--border-light);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background-color: var(--accent-subtle);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .notification-content {
      flex: 1;
      min-width: 0;
    }

    .notification-title {
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .notification-message {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .notification-time {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* ============ LOADING ============ */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .dashboard-content {
        padding: 1rem;
      }

      .stat-cards {
        grid-template-columns: 1fr;
      }

      .top-bar {
        padding: 1rem;
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .top-bar-right {
        width: 100%;
        justify-content: space-between;
        gap: 1rem;
      }

      .tab-bar {
        margin-bottom: 1rem;
      }

      .filter-bar {
        padding: 1rem;
      }

      .summary-bar {
        gap: 1.5rem;
      }

      .quick-links,
      .template-cards {
        grid-template-columns: 1fr;
      }

      .table {
        font-size: 0.85rem;
      }

      .table th,
      .table td {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <!-- TOP BAR -->
  <div class="top-bar" id="topBar" style="display: none;">
    <a href="/" class="logo">KNIGHT<span>OPS</span></a>
    <div class="top-bar-right">
      <div class="partner-name" id="partnerNameDisplay"></div>
      <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-container">
      <div class="login-box">
        <h1>KNIGHT<span style="color: var(--accent);">OPS</span></h1>
        <p>Partner Portal</p>
        <input type="email" class="login-input" id="emailInput" placeholder="Enter your email">
        <button class="login-btn" onclick="requestMagicLink()">Send Access Link</button>
        <div class="login-message">
          We'll send you a secure link to access your portal.
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardContainer" style="display: none;">
    <div class="dashboard-content">
      <!-- TAB BAR -->
      <div class="tab-bar">
        <button class="tab-button active" onclick="switchTab('overview')">Overview</button>
        <button class="tab-button" onclick="switchTab('leads')">My Leads</button>
        <button class="tab-button" onclick="switchTab('commissions')">My Commissions</button>
        <button class="tab-button" onclick="switchTab('links')">My Links</button>
        <button class="tab-button" onclick="switchTab('notifications')">Notifications</button>

    function getTokenFromHash() {
      const hash = window.location.hash;
      const match = hash.match(/token=([^&]+)/);
      return match ? match[1] : null;

      try {

              <div class="empty-state-icon">!</div>
              <p>No notifications yet</p>
            </div>
          `;
          return;
        }

        container.innerHTML = notifications.map(notification => {
          const icon = getNotificationIcon(notification.type);
          const unreadClass = notification.is_read ? '' : ' unread';
          
          return `
            <div class="notification-item${unreadClass}" onclick="markNotificationRead('${notification.id}')">
              <div class="notification-icon">${icon}</div>
              <div class="notification-content">
                <div class="notification-title">${notification.title}</div>
                <div class="notification-message">${notification.message}</div>
                <div class="notification-time">${getTimeAgo(notification.created_at)}</div>
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading notifications:', error);
        container.innerHTML = '<div class="empty-state"><p>Unable to load notifications</p></div>';
      }
    }

    async function markNotificationRead(notificationId) {
      try {
        await fetch(
          `${SUPABASE_URL}/rest/v1/partner_notifications?id=eq.${notificationId}`,
          {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ is_read: true })
          }
        );
        loadNotifications();
      } catch (error) {
        console.error('Error marking notification as read:', error);
      }
    }

    async function markAllNotificationsRead() {
      try {
        await fetch(
          `${SUPABASE_URL}/rest/v1/partner_notifications?partner_id=eq.${currentPartnerId}&is_read=eq.false`,
          {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ is_read: true })
          }
        );
        loadNotifications();
      } catch (error) {
        console.error('Error marking all notifications as read:', error);
      }
    }

    function getNotificationIcon(type) {
      const icons = {
        'new_lead': '+',
        'lead_status_change': '→',
        'commission_pending': 'C',
        'commission_approved': '✓',
        'commission_paid': '$'
      };
      return icons[type] || '●';
    }

    // ============ PROFILE TAB ============
    function loadProfile() {
      document.getElementById('profileFullName').value = currentPartnerData?.full_name || '';
      document.getElementById('profileEmail').value = currentPartnerData?.email || '';
      document.getElementById('profilePhone').value = currentPartnerData?.phone || '';
      document.getElementById('profileCompany').value = currentPartnerData?.company || '';
      document.getElementById('profileWebsite').value = currentPartnerData?.website || '';
      document.getElementById('profilePaypalEmail').value = currentPartnerData?.paypal_email || '';
      document.getElementById('profileSlug').value = currentPartnerData?.slug || '';
      document.getElementById('profileCommissionRate').value = (currentPartnerData?.commission_rate || 0) + '%';
    }

    async function saveProfile(event) {
      event.preventDefault();

      const updates = {
        full_name: document.getElementById('profileFullName').value,
        phone: document.getElementById('profilePhone').value,
        company: document.getElementById('profileCompany').value,
        website: document.getElementById('profileWebsite').value,
        paypal_email: document.getElementById('profilePaypalEmail').value,
        slug: document.getElementById('profileSlug').value
      };

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/partners?id=eq.${currentPartnerId}`,
          {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(updates)
          }
        );

        if (response.ok) {
          currentPartnerData = { ...currentPartnerData, ...updates };
          document.getElementById('partnerNameDisplay').textContent = currentPartnerData.full_name;
          alert('Profile updated successfully!');
        }
      } catch (error) {
        console.error('Error saving profile:', error);
        alert('Error saving profile');
      }
    }

    // ============ UTILITY FUNCTIONS ============
    function copyToClipboard(text, button) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = button.textContent;
        button.textContent = 'Copied!';
        button.classList.add('copied');
        setTimeout(() => {
          button.textContent = originalText;
          button.classList.remove('copied');
        }, 2000);
      });
    }

    function copyTemplate(text, button) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = button.textContent;
        button.textContent = 'Copied!';
        button.classList.add('copied');
        setTimeout(() => {
          button.textContent = originalText;
          button.classList.remove('copied');
        }, 2000);
      });
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(amount);
    }

    function getTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const secondsAgo = Math.floor((now - date) / 1000);

      if (secondsAgo < 60) return 'Just now';
      if (secondsAgo < 3600) return Math.floor(secondsAgo / 60) + ' minutes ago';
      if (secondsAgo < 86400) return Math.floor(secondsAgo / 3600) + ' hours ago';
      if (secondsAgo < 604800) return Math.floor(secondsAgo / 86400) + ' days ago';
      
      return formatDate(dateString);
    }

    async function supabaseQuery(table, operation, filters) {
      let url = `${SUPABASE_URL}/rest/v1/${table}?`;
      
      Object.entries(filters).forEach(([key, value]) => {
        if (Array.isArray(value)) {
          value.forEach(v => {
            url += `${key}=in.(${v}),`;
          });
        } else {
          url += `${key}=eq.${encodeURIComponent(value)}&`;
        }
      });

      if (operation === 'COUNT') {
        url += '&select=count()';
      } else if (operation.startsWith('SUM')) {
        url += `&select=${encodeURIComponent(operation)}`;
      }

      const response = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      const data = await response.json();
      return data[0]?.[Object.keys(data[0])[0]] || 0;
    }

    function signOut() {
      localStorage.removeItem('ko_partner_id');
      localStorage.removeItem('ko_partner_token');
      currentPartnerId = null;
      currentPartnerData = null;
      window.location.href = '/';
    }

    // ============ STARTUP ============
    window.addEventListener('load', initApp);
  </script>
