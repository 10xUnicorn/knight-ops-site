<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Knight Ops Command</title>
<style>
:root{--accent:#C8A456;--accent-glow:rgba(200,164,86,0.3);--bg:#0A0A0B;--surface:#111113;--surface-2:#1A1A1F;--surface-3:#222228;--text:#F5F5F5;--text-muted:#999;--border:rgba(200,164,86,0.15);--border-subtle:rgba(255,255,255,0.06);--error:#E53935;--success:#4CAF50;--warning:#FF9800;--info:#2196F3;--sidebar-w:240px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}

/* ── LAYOUT ── */
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:1.25rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo .shield{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#A08636);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--bg);font-weight:800}
.sidebar-logo span{font-size:1rem;font-weight:700;letter-spacing:1px}
.sidebar nav{flex:1;padding:0.5rem 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;cursor:pointer;color:var(--text-muted);font-size:0.9rem;transition:all 0.2s;border-left:3px solid transparent}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{color:var(--accent);background:rgba(200,164,86,0.05);border-left-color:var(--accent)}
.nav-item .icon{width:20px;text-align:center}
.sidebar-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);font-size:0.8rem;color:var(--text-muted)}
.sidebar-footer .user-email{color:var(--text);font-weight:500;display:block;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-footer button{background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;margin-top:6px;transition:all 0.2s}
.sidebar-footer button:hover{border-color:var(--accent);color:var(--accent)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0}
.topbar h1{font-size:1.2rem;font-weight:700}
.topbar-actions{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:1.5rem}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#A08636);color:var(--bg)}
.btn-primary:hover{box-shadow:0 0 20px var(--accent-glow)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:rgba(229,57,53,0.1);color:var(--error);border:1px solid rgba(229,57,53,0.3)}
.btn-sm{padding:5px 10px;font-size:0.8rem}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.kpi .label{font-size:0.8rem;color:var(--text-muted);margin-bottom:6px}
.kpi .value{font-size:1.8rem;font-weight:800;color:var(--accent)}
.kpi .sub{font-size:0.75rem;color:var(--text-muted);margin-top:4px}

/* ── TABLES ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.table-header h2{font-size:1rem;font-weight:600}
.table-filters{display:flex;gap:8px;align-items:center}
.table-filters input,.table-filters select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:0.85rem;font-family:inherit}
.table-filters input::placeholder{color:#555}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 1.25rem;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:600}
td{padding:10px 1.25rem;font-size:0.9rem;border-bottom:1px solid var(--border-subtle)}
tr:hover td{background:rgba(200,164,86,0.02)}
.table-empty{padding:3rem;text-align:center;color:var(--text-muted);font-size:0.9rem}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:0.75rem;font-weight:600}
.badge-success{background:rgba(76,175,80,0.1);color:var(--success);border:1px solid rgba(76,175,80,0.2)}
.badge-warning{background:rgba(255,152,0,0.1);color:var(--warning);border:1px solid rgba(255,152,0,0.2)}
.badge-error{background:rgba(229,57,53,0.1);color:var(--error);border:1px solid rgba(229,57,53,0.2)}
.badge-info{background:rgba(33,150,243,0.1);color:var(--info);border:1px solid rgba(33,150,243,0.2)}
.badge-gold{background:rgba(200,164,86,0.1);color:var(--accent);border:1px solid rgba(200,164,86,0.2)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
.modal-head{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:1.1rem;font-weight:700}
.modal-head .close{background:none;border:none;color:var(--text-muted);font-size:1.2rem;cursor:pointer}
.modal-body{padding:1.25rem}
.modal-foot{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── FORMS ── */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

/* ── DETAIL VIEW ── */
.detail-back{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);cursor:pointer;font-size:0.9rem;margin-bottom:1rem}
.detail-back:hover{color:var(--accent)}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.detail-header h2{font-size:1.4rem;font-weight:700}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.detail-tab{padding:10px 20px;font-size:0.85rem;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.detail-tab:hover{color:var(--text)}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.detail-pane{display:none}
.detail-pane.active{display:block}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.info-item .info-label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.info-item .info-value{font-size:0.95rem}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:0.9rem;z-index:2000;transform:translateY(100px);opacity:0;transition:all 0.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(76,175,80,0.4)}
.toast.error{border-color:rgba(229,57,53,0.4)}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ── TOGGLE ── */
.toggle{width:40px;height:22px;background:var(--surface-3);border-radius:11px;position:relative;cursor:pointer;border:1px solid var(--border);transition:all 0.2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:all 0.2s}
.toggle.on::after{left:20px}

/* ── ACTIVITY LOG ── */
.activity-list{list-style:none}
.activity-list li{padding:10px 0;border-bottom:1px solid var(--border-subtle);font-size:0.85rem;display:flex;gap:10px}
.activity-list .time{color:var(--text-muted);white-space:nowrap;font-size:0.8rem}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform 0.3s}
  .sidebar.open{transform:translateX(0)}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="shield">K</div>
      <span>KNIGHT OPS</span>
    </div>
    <nav>
      <div class="nav-item active" data-view="dashboard"><span class="icon">&#9632;</span> Dashboard</div>

  <!-- MAIN -->

      <!-- TASKS VIEW -->

            <div class="table-filters">
              <select id="taskStatusFilter" onchange="loadTasks()">

                <option value="in_progress">In Progress</option>

          </div>
          <div id="tasksTable"></div>
        </div>
      </div>

      <!-- APP LIBRARY VIEW -->
      <div class="view" id="v-apps">
        <div class="table-card">
          <div class="table-header">
            <h2>App Library</h2>
            <div class="table-filters">
              <button class="btn btn-primary btn-sm" onclick="openModal('app')">+ Add App</button>
            </div>
          </div>
          <div id="appsGrid" style="padding:1.25rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem"></div>
        </div>
      </div>

      <!-- EVENTS VIEW -->
      <div class="view" id="v-events">
        <div class="table-card">
          <div class="table-header">
            <h2>Events</h2>

              <button class="btn btn-primary btn-sm" onclick="openModal('event')">+ Create Event</button>

      <!-- RESOURCES VIEW -->

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Add</h2>
      <button class="close" onclick="closeModal()">&times;</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ══════════════════════════════════════════════
// KNIGHT OPS ADMIN — SUPABASE INIT
// ══════════════════════════════════════════════
const SUPABASE_URL='https://trpnlkntvulkjerevngm.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRycG5sa250dnVsa2plcmV2bmdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Njg1MDQsImV4cCI6MjA5MDA0NDUwNH0.q9UrZDjbl7c3xC1eTsq46Qg5MmWNogot2ByZ9c_54cM';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

let currentUser=null;
let allLeads=[];
let allClients=[];
let allProjects=[];

// ══════════════════════════════════════════════
// AUTH GATE
// ══════════════════════════════════════════════
(async function(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/auth';return}
  // Check admin role
  const{data:profile}=await sb.from('profiles').select('role').eq('id',session.user.id).single();
  if(!profile||profile.role!=='admin'){window.location.href='/portal';return}
  currentUser=session.user;
  document.getElementById('userEmail').textContent=currentUser.email;
  init();
})();

async function handleLogout(){
  await sb.auth.signOut();
  window.location.href='/auth';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init(){
  setupNav();
  loadDashboard();
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function setupNav(){
  document.querySelectorAll('.nav-item').forEach(item=>{
    item.addEventListener('click',()=>{
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      item.classList.add('active');
      const view=item.dataset.view;
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      document.getElementById('v-'+view).classList.add('active');
      document.getElementById('pageTitle').textContent=item.textContent.trim();
      // Reset detail views
      document.getElementById('clientsList').style.display='';
      document.getElementById('clientDetail').style.display='none';
      document.getElementById('projectsList').style.display='';
      document.getElementById('projectDetail').style.display='none';
      // Load data
      const loaders={dashboard:loadDashboard,leads:loadLeads,clients:loadClients,projects:loadProjects,tasks:loadTasks,apps:loadApps,events:loadEvents,resources:loadResources};
      if(loaders[view])loaders[view]();
    });
  });
}

// ══════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════
function fmt$(n){return n?'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0}):'$0'}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function badge(text,type){return`<span class="badge badge-${type||'gold'}">${text||'—'}</span>`}
function statusBadge(s){
  const map={new:'info',contacted:'warning',qualified:'gold',proposal_sent:'gold',negotiation:'warning',won:'success',lost:'error',
    active:'success',inactive:'error',onboarding:'info',paused:'warning',churned:'error',
    discovery:'info',proposal:'gold',approved:'success',in_progress:'warning',review:'info',launched:'success',maintenance:'gold',cancelled:'error',
    pending:'warning',completed:'success',blocked:'error',skipped:'error',
    not_started:'info',behind:'error',on_track:'success',at_risk:'warning',
    draft:'info',published:'success',archived:'error',featured:'gold',
    upcoming:'info',live:'success',past:'error'};
  return badge(s?s.replace(/_/g,' '):'—',map[s]||'gold');
}
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ══════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════
async function loadDashboard(){
  const[{count:leadCount},{count:clientCount},{count:projCount},{count:taskCount},{data:recentLeads},{data:recentProjects}]=await Promise.all([
    sb.from('leads').select('*',{count:'exact',head:true}),
    sb.from('clients').select('*',{count:'exact',head:true}),
    sb.from('projects').select('*',{count:'exact',head:true}),
    sb.from('tasks').select('*',{count:'exact',head:true}).eq('status','in_progress'),
    sb.from('leads').select('id,name,email,status,created_at').order('created_at',{ascending:false}).limit(5),
    sb.from('projects').select('id,name,status,tier,created_at').order('created_at',{ascending:false}).limit(5)

async function loadLeads(){

  allLeads=data||[];

}

function filterLeads(){
  const q=document.getElementById('leadSearch').value.toLowerCase();
  const s=document.getElementById('leadStatusFilter').value;
  let filtered=allLeads;
  if(q)filtered=filtered.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q)||(l.company||'').toLowerCase().includes(q));
  if(s)filtered=filtered.filter(l=>l.status===s);
  renderLeads(filtered);
}

function renderLeads(leads){
  if(!leads.length){document.getElementById('leadsTable').innerHTML='<div class="table-empty">No leads found</div>';return}
  let h=`<table><thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Source</th><th>Status</th><th>Budget</th><th>Date</th><th></th></tr></thead><tbody>`;
  leads.forEach(l=>{
    h+=`<tr>
      <td><strong>${l.name||''}</strong></td>
      <td>${l.email||''}</td>
      <td>${l.company||'—'}</td>
      <td>${l.source||'—'}</td>
      <td>${statusBadge(l.status)}</td>
      <td>${fmt$(l.estimated_budget)}</td>
      <td>${fmtDate(l.created_at)}</td>
      <td><button class="btn btn-sm btn-secondary" onclick="editLead('${l.id}')">Edit</button>
          <button class="btn btn-sm btn-primary" onclick="convertLead('${l.id}')" title="Convert to client">&#10132;</button></td>

  });
  h+='</tbody></table>';
  document.getElementById('leadsTable').innerHTML=h;
}

function editLead(id){
  const l=allLeads.find(x=>x.id===id);if(!l)return;
  openModal('lead',l);
}

async function convertLead(id){
  const l=allLeads.find(x=>x.id===id);if(!l)return;
  if(!confirm(`Convert "${l.name}" to a client?`))return;
  // Create client from lead
  const{data:client,error}=await sb.from('clients').insert({
    name:l.name,email:l.email,phone:l.phone,company:l.company,
    tier:'night_launch',status:'onboarding',source_lead_id:l.id,
    notes:'Converted from lead on '+new Date().toLocaleDateString()
  }).select().single();
  if(error){toast(error.message,'error');return}
  // Update lead status
  await sb.from('leads').update({status:'won'}).eq('id',id);
  toast('Lead converted to client!');
  loadLeads();
}

function switchDetailTab(el,prefix){
  const tabs=el.parentElement;
  tabs.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const idx=Array.from(tabs.children).indexOf(el);
  const panes=tabs.parentElement.querySelectorAll('.detail-pane');
  panes.forEach(p=>p.classList.remove('active'));
  if(panes[idx])panes[idx].classList.add('active');
}

async function cycleTaskStatus(taskId,current){
  const order=['pending','in_progress','completed','blocked'];
  const next=order[(order.indexOf(current)+1)%order.length];
  await sb.from('tasks').update({status:next}).eq('id',taskId);
  toast(`Task → ${next.replace(/_/g,' ')}`);
  // Reload the project detail if visible
  const projDetail=document.getElementById('projectDetail');
  if(projDetail.style.display!=='none'){
    const backBtn=projDetail.querySelector('.detail-back');
    if(backBtn){
      // Re-fetch project — get project_id from tasks
      const{data:task}=await sb.from('tasks').select('project_id').eq('id',taskId).single();
      if(task)openProjectDetail(task.project_id);
    }
  } else {
    loadTasks();
  }
}

async function uploadProjectFile(input,projectId){
  const file=input.files[0];if(!file)return;
  const path=`${projectId}/${Date.now()}_${file.name}`;
  const{error:upErr}=await sb.storage.from('project-files').upload(path,file);
  if(upErr){toast(upErr.message,'error');return}
  await sb.from('project_files').insert({project_id:projectId,file_name:file.name,storage_path:path,category:'deliverable',uploaded_by:currentUser.id});
  toast('File uploaded!');
  openProjectDetail(projectId);
}

async function postComment(projectId){
  const el=document.getElementById('newComment');
  const content=el.value.trim();if(!content)return;
  await sb.from('project_comments').insert({project_id:projectId,author_id:currentUser.id,content,is_internal:false});
  toast('Comment posted');
  openProjectDetail(projectId);
}

      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;line-height:1.4">${a.short_description||''}</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem">
        ${a.is_featured?badge('Featured','gold'):''}
        ${a.is_popular?badge('Popular','success'):''}
        ${a.pricing_model?badge(a.pricing_model,'info'):''}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;color:var(--accent)">${a.price_display||'Free'}</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-secondary" onclick='openModal("app",${JSON.stringify(a).replace(/'/g,"&#39;")})'>Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteApp('${a.id}')">Del</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('appsGrid').innerHTML=h;
}

async function deleteApp(id){
  if(!confirm('Delete this app from the library?'))return;
  await sb.from('app_library').delete().eq('id',id);
  toast('App deleted');loadApps();
}

// ══════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════
async function loadEvents(){
  const{data,error}=await sb.from('events').select('*').order('event_date',{ascending:false});
  if(error){toast(error.message,'error');return}
  if(!data||!data.length){document.getElementById('eventsTable').innerHTML='<div class="table-empty">No events</div>';return}
  let h=`<table><thead><tr><th>Title</th><th>Type</th><th>Date</th><th>Location</th><th>Capacity</th><th>Price</th><th>Status</th><th></th></tr></thead><tbody>`;
  data.forEach(e=>{
    h+=`<tr>
      <td><strong>${e.title}</strong></td>
      <td>${badge((e.event_type||'').replace(/_/g,' '),'info')}</td>
      <td>${fmtDate(e.event_date)}</td>
      <td>${e.location||'—'}</td>
      <td>${e.capacity||'∞'}</td>
      <td>${fmt$(e.price)}</td>
      <td>${statusBadge(e.status)}</td>
      <td><button class="btn btn-sm btn-secondary" onclick='openModal("event",${JSON.stringify(e).replace(/'/g,"&#39;")})'>Edit</button></td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('eventsTable').innerHTML=h;
}

// ══════════════════════════════════════════════
// RESOURCES
// ══════════════════════════════════════════════
async function loadResources(){
  const t=(document.getElementById('resTypeFilter')||{}).value;
  let query=sb.from('resources').select('*').order('created_at',{ascending:false});
  if(t)query=query.eq('resource_type',t);
  const{data,error}=await query;
  if(error){toast(error.message,'error');return}
  if(!data||!data.length){document.getElementById('resourcesTable').innerHTML='<div class="table-empty">No resources</div>';return}
  let h=`<table><thead><tr><th>Title</th><th>Type</th><th>Access</th><th>Created</th><th></th></tr></thead><tbody>`;
  data.forEach(r=>{
    h+=`<tr>
      <td><strong>${r.title}</strong></td>
      <td>${badge((r.resource_type||'').replace(/_/g,' '),'info')}</td>
      <td>${r.access_tier?badge(r.access_tier.replace(/_/g,' '),'gold'):'All'}</td>
      <td>${fmtDate(r.created_at)}</td>
      <td>
        ${r.url?`<a href="${r.url}" target="_blank" class="btn btn-sm btn-secondary">Open</a>`:''}
        <button class="btn btn-sm btn-secondary" onclick='openModal("resource",${JSON.stringify(r).replace(/'/g,"&#39;")})'>Edit</button>
      </td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('resourcesTable').innerHTML=h;
}

let modalType='';
let modalData=null;
let modalExtra=null;

function openModal(type,data=null,extra=null){
  modalType=type;modalData=data;modalExtra=extra;
  const overlay=document.getElementById('modalOverlay');
  const title=document.getElementById('modalTitle');
  const body=document.getElementById('modalBody');
  const saveBtn=document.getElementById('modalSave');

  title.textContent=(data?'Edit':'Add')+' '+type.charAt(0).toUpperCase()+type.slice(1);
  body.innerHTML=getFormHTML(type,data,extra);
  saveBtn.onclick=()=>saveModal();
  overlay.classList.add('active');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
}

    <div class="form-row">
      <div class="form-group"><label>Project</label>

    <div class="form-row">

function gv(id){const el=document.getElementById(id);return el?el.value.trim():'';}

async function saveModal(){
  const saveBtn=document.getElementById('modalSave');
  saveBtn.disabled=true;saveBtn.textContent='Saving...';

  try{
    let table,payload,id;

    if(modalType==='lead'){
      table='leads';id=modalData?.id;
      payload={name:gv('f_name'),email:gv('f_email'),phone:gv('f_phone')||null,company:gv('f_company')||null,
        source:gv('f_source')||null,status:gv('f_status'),estimated_budget:gv('f_budget')?Number(gv('f_budget')):null,
        interested_tier:gv('f_tier')||null,notes:gv('f_notes')||null};
    }
    else if(modalType==='client'){
      table='clients';id=modalData?.id;
      payload={name:gv('f_name'),email:gv('f_email'),phone:gv('f_phone')||null,company:gv('f_company')||null,
        tier:gv('f_tier'),status:gv('f_status'),notes:gv('f_notes')||null};
    }
    else if(modalType==='project'){
      table='projects';id=modalData?.id;
      payload={name:gv('f_name'),client_id:gv('f_client_id')||null,tier:gv('f_tier'),status:gv('f_status'),
        payment_status:gv('f_payment_status'),total_price:gv('f_total_price')?Number(gv('f_total_price')):null,
        amount_paid:gv('f_amount_paid')?Number(gv('f_amount_paid')):null,start_date:gv('f_start_date')||null,
        deadline:gv('f_deadline')||null,description:gv('f_description')||null};
    }
    else if(modalType==='task'){
      table='tasks';id=modalData?.id;
      payload={title:gv('f_title'),project_id:gv('f_project_id')||null,task_type:gv('f_task_type'),
        status:gv('f_status'),priority:gv('f_priority'),due_date:gv('f_due_date')||null,
        description:gv('f_description')||null};
    }
    else if(modalType==='app'){
      table='app_library';id=modalData?.id;
      payload={name:gv('f_name'),tagline:gv('f_tagline')||null,short_description:gv('f_short_description')||null,
        category:gv('f_category')||null,status:gv('f_status'),pricing_model:gv('f_pricing_model'),
        price_display:gv('f_price_display')||null,cta_label:gv('f_cta_label')||null,cta_url:gv('f_cta_url')||null,
        is_featured:gv('f_is_featured')==='true',is_popular:gv('f_is_popular')==='true',sort_order:Number(gv('f_sort_order'))||0};
    }
    else if(modalType==='event'){
      table='events';id=modalData?.id;
      payload={title:gv('f_title'),event_type:gv('f_event_type'),status:gv('f_status'),
        event_date:gv('f_event_date')||null,location:gv('f_location')||null,
        capacity:gv('f_capacity')?Number(gv('f_capacity')):null,price:gv('f_price')?Number(gv('f_price')):null,
        description:gv('f_description')||null};
    }
    else if(modalType==='resource'){
      table='resources';id=modalData?.id;
      payload={title:gv('f_title'),resource_type:gv('f_resource_type'),access_tier:gv('f_access_tier')||null,
        url:gv('f_url')||null,description:gv('f_description')||null};
    }

    let error;
    if(id){
      ({error}=await sb.from(table).update(payload).eq('id',id));
    }else{
      ({error}=await sb.from(table).insert(payload));
    }
    if(error)throw error;

    toast((id?'Updated':'Created')+' successfully!');
    closeModal();

    // Reload relevant view
    const reloaders={lead:loadLeads,client:loadClients,project:loadProjects,task:loadTasks,app:loadApps,event:loadEvents,resource:loadResources};
    if(reloaders[modalType])reloaders[modalType]();

  }catch(err){
    toast(err.message||'Save failed','error');
  }finally{
    saveBtn.disabled=false;saveBtn.textContent='Save';
  }
}
