<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Knight Ops</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0B;--surface:#111113;--accent:#C8A456;--accent-glow:rgba(200,164,86,.25);--text:#F5F5F5;--text-muted:#888}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(200,164,86,.04) 0%,transparent 50%);animation:drift 20s ease-in-out infinite;pointer-events:none}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(-5%,3%)}}
.container{position:relative;z-index:1;max-width:560px}
.code{font-size:clamp(6rem,15vw,10rem);font-weight:800;letter-spacing:-4px;background:linear-gradient(135deg,var(--accent),#A08636,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.5rem}
.title{font-size:clamp(1.25rem,3vw,1.75rem);font-weight:700;margin-bottom:1rem;color:var(--text)}
.desc{font-size:1rem;color:var(--text-muted);line-height:1.6;margin-bottom:2.5rem}
.actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:8px;font-size:.95rem;font-weight:600;text-decoration:none;transition:all .25s;cursor:pointer;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),#A08636);color:var(--bg);box-shadow:0 0 20px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 30px var(--accent-glow)}
.btn-ghost{background:transparent;border:1px solid rgba(200,164,86,.3);color:var(--accent)}
.btn-ghost:hover{border-color:var(--accent);background:rgba(200,164,86,.08)}
.shield{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#A08636);border-radius:12px;font-size:1.5rem;font-weight:900;color:var(--bg);margin-bottom:2rem}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="container">
  <div class="shield">K</div>
  <div class="code">404</div>
  <h1 class="title">This page doesn't exist</h1>
  <p class="desc">The page you're looking for may have been moved, renamed, or never existed. Let's get you back on track.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Back Home</a>
    <a href="/services" class="btn btn-ghost"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> View Services</a>
  </div>
</div>
</body>
</html>
