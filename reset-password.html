<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reset Password | Knight Ops</title><style>:root{--accent:#C8A456;--accent-glow:rgba(200,164,86,0.3);--bg:#0A0A0B;--surface:#111113;--surface-2:#1A1A1F;--text:#F5F5F5;--text-muted:#999;--border:rgba(200,164,86,0.15);--error:#E53935;--success:#4CAF50}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);opacity:0.1;pointer-events:none}.reset-container{width:100%;max-width:420px;padding:2rem}.reset-logo{text-align:center;margin-bottom:2.5rem}.reset-logo a{text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:12px}.shield{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#A08636);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--bg);font-weight:800}.reset-logo .brand{font-size:1.3rem;font-weight:700;color:var(--text);letter-spacing:2px}.reset-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;position:relative;overflow:hidden}.reset-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#A08636,var(--accent))}.reset-card h1{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.5rem}.reset-card .subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem}.reset-form{display:flex;flex-direction:column;gap:1rem}.form-group{display:flex;flex-direction:column;gap:6px}.form-group label{font-size:0.85rem;color:var(--text-muted);font-weight:500}.form-group input{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:0.95rem;color:var(--text);font-family:inherit;transition:all 0.3s;outline:none}.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,164,86,0.1)}.form-group input::placeholder{color:#555}.reset-btn{background:linear-gradient(135deg,var(--accent),#A08636);color:var(--bg);border:none;padding:14px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:0.5rem;letter-spacing:0.5px;width:100%}.reset-btn:hover{box-shadow:0 0 30px var(--accent-glow);transform:translateY(-2px)}.reset-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}.reset-status{text-align:center;padding:12px;border-radius:10px;font-size:0.9rem;margin-top:1rem;display:none}.reset-status.error{display:block;background:rgba(229,57,53,0.1);border:1px solid rgba(229,57,53,0.3);color:var(--error)}.reset-status.success{display:block;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);color:var(--success)}.password-rules{font-size:0.8rem;color:var(--text-muted);margin-top:4px;line-height:1.5}.password-rules span{display:block}.password-rules span.met{color:var(--success)}.password-rules span.unmet{color:var(--text-muted)}.reset-footer{text-align:center;margin-top:2rem;font-size:0.85rem;color:var(--text-muted)}.reset-footer a{color:var(--accent);text-decoration:none}.success-view{display:none;text-align:center;padding:1rem 0}.success-view .checkmark{font-size:48px;margin-bottom:16px}.success-view h2{font-size:1.3rem;margin-bottom:8px}.success-view p{color:var(--text-muted);font-size:0.9rem;margin-bottom:24px}.success-view a{display:inline-block;background:linear-gradient(135deg,var(--accent),#A08636);color:var(--bg);padding:12px 28px;border-radius:10px;font-weight:700;text-decoration:none;transition:all 0.3s}.success-view a:hover{box-shadow:0 0 30px var(--accent-glow);transform:translateY(-2px)}@media(max-width:480px){.reset-container{padding:1rem}.reset-card{padding:2rem 1.5rem;border-radius:16px}}</style></head><body><div class="reset-container">  <div class="reset-logo">    <a href="/">      <div class="shield">K</div>      <span class="brand">KNIGHT OPS</span>    </a>  </div>  <div class="reset-card">    <div id="formView">      <h1>Reset Your Password</h1>      <p class="subtitle">Enter your new password below</p>      <form class="reset-form" id="resetForm" onsubmit="handleReset(event)">        <div class="form-group">          <label>New Password</label>          <input type="password" id="newPassword" placeholder="Enter new password" required minlength="8" autocomplete="new-password" oninput="checkRules()">          <div class="password-rules" id="rules">            <span id="ruleLen" class="unmet">&#x2022; At least 8 characters</span>            <span id="ruleUpper" class="unmet">&#x2022; One uppercase letter</span>            <span id="ruleNum" class="unmet">&#x2022; One number</span>          </div>        </div>        <div class="form-group">          <label>Confirm Password</label>          <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8" autocomplete="new-password">        </div>        <button type="submit" class="reset-btn" id="resetBtn">Set New Password</button>      </form>      <div class="reset-status" id="resetStatus"></div>    </div>    <div class="success-view" id="successView">      <div class="checkmark">&#10003;</div>      <h2>Password Updated</h2>      <p>Your password has been successfully reset. You can now sign in with your new password.</p>      <a href="/auth">Sign In Now</a>    </div>  </div>  <div class="reset-footer">    <p><a href="/auth">Back to Sign In</a></p>  </div></div><script src="/supabase.min.js"></script><script>const SUPABASE_URL='https://trpnlkntvulkjerevngm.supabase.co';const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRycG5sa250dnVsa2plcmV2bmdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Njg1MDQsImV4cCI6MjA5MDA0NDUwNH0.q9UrZDjbl7c3xC1eTsq46Qg5MmWNogot2ByZ9c_54cM';const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);function showStatus(msg,type){const el=document.getElementById('resetStatus');el.textContent=msg;el.className='reset-status '+type;}function checkRules(){const pw=document.getElementById('newPassword').value;const len=pw.length>=8;const upper=/[A-Z]/.test(pw);const num=/[0-9]/.test(pw);document.getElementById('ruleLen').className=len?'met':'unmet';document.getElementById('ruleUpper').className=upper?'met':'unmet';document.getElementById('ruleNum').className=num?'met':'unmet';}async function handleReset(e){e.preventDefault();const btn=document.getElementById('resetBtn');const pw=document.getElementById('newPassword').value;const confirm=document.getElementById('confirmPassword').value;if(pw!==confirm){showStatus('Passwords do not match.','error');return;}if(pw.length<8){showStatus('Password must be at least 8 characters.','error');return;}btn.disabled=true;btn.textContent='Updating...';const{data,error}=await sb.auth.updateUser({password:pw});if(error){showStatus(error.message,'error');btn.disabled=false;btn.textContent='Set New Password';return;}document.getElementById('formView').style.display='none';document.getElementById('successView').style.display='block';}// Handle the recovery token from the URL
// Supabase sends: /reset-password#access_token=...&type=recovery
sb.auth.onAuthStateChange(function(event,session){console.log('[Reset] Auth event:',event);if(event==='PASSWORD_RECOVERY'){console.log('[Reset] Recovery mode active - user can set new password');}if(event==='SIGNED_IN'&&session){console.log('[Reset] User signed in via recovery token');}});// Check if we have a valid session/token
(async function(){const hash=window.location.hash;const params=new URLSearchParams(window.location.search);if(!hash&&!params.has('code')&&!params.has('token')){// No token in URL - check if there's already a session
const{data}=await sb.auth.getSession();if(!data.session){showStatus('No reset token found. Please request a new password reset link.','error');document.getElementById('resetBtn').disabled=true;}}})();</script></body></html>
